<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Display Routing Calibration</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      border: 18px solid #fff;
      background-color: var(--field, #0b6bcb);
      background-image:
        linear-gradient(rgba(255,255,255,.24) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255,255,255,.24) 2px, transparent 2px);
      background-size: 10% 10%;
      color: #fff;
      font-family: "Arial Narrow", "Segoe UI", sans-serif;
      text-align: center;
    }
    main { padding: 4vh 5vw; background: rgba(0,0,0,.72); border: 3px solid #fff; }
    small { display: block; font-size: clamp(14px, 2vw, 34px); font-weight: 800; letter-spacing: .22em; }
    strong { display: block; margin-top: .08em; font-size: clamp(70px, 14vw, 260px); line-height: .9; }
    span { display: block; margin-top: .5em; font: 700 clamp(12px, 1.5vw, 28px) Consolas, monospace; }
  </style>
</head>
<body>
  <main>
    <small>MBFD ROUTING CALIBRATION</small>
    <strong id="label">TV</strong>
    <span id="details">1920 x 1080</span>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var colors = { blue: '#0757b8', cyan: '#087f8c', green: '#157347', orange: '#a94f05', red: '#a51d2d' };
      var label = String(params.get('label') || 'TV').slice(0, 24);
      var wall = String(params.get('wall') || 'UNASSIGNED').slice(0, 24);
      var color = colors[params.get('color')] || colors.blue;
      document.documentElement.style.setProperty('--field', color);
      document.getElementById('label').textContent = label;
      document.getElementById('details').textContent = wall + ' / ' + window.innerWidth + ' x ' + window.innerHeight;
      document.title = label + ' Routing Calibration';
    })();
  </script>
</body>
</html>
