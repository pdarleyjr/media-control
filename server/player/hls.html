<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Live Channel</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #cam { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; z-index: 2; }
    #label {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 4;
      padding: 10px 16px; font-size: 18px; font-weight: 600; color: #fff;
      background: linear-gradient(0deg, rgba(0,0,0,.72), rgba(0,0,0,0));
      text-shadow: 0 1px 3px rgba(0,0,0,.8); pointer-events: none;
      display: flex; align-items: center; gap: 10px;
    }
    #label .dot { width: 9px; height: 9px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    #state {
      position: fixed; inset: 0; z-index: 3; display: flex; align-items: center; justify-content: center;
      color: #cbd5e1; font-size: 20px; text-align: center; padding: 24px; background: #000;
    }
    #state.hide { display: none; }
    @media (prefers-reduced-motion: reduce) { #label .dot { box-shadow: none; } }
  </style>
</head>
<body>
  <video id="cam" muted playsinline autoplay></video>
  <div id="state"><span id="statetext">Connecting…</span></div>
  <div id="label" hidden><span class="dot" aria-hidden="true"></span><span id="labeltext"></span></div>
  <script src="device-contract.js"></script>
  <script src="vendor/hls.light.min.js"></script>
  <script>
    // Generic live-channel wrapper for the Camera Feeds "Live News" folder.
    // The station's HLS .m3u8 is resolved (and, for CORS/encryption-restricted
    // stations, proxied) SERVER-SIDE by /player/news-stream?station=<key>, which
    // returns { source }. We play that with hls.js — the player core has no HLS
    // branch, so this self-contained page is what the display iframes. Station is
    // a server-whitelisted key, never a raw URL (no SSRF/open-embed surface).
    (function () {
      var params = new URLSearchParams(location.search);
      var station = (params.get('station') || '').toLowerCase().replace(/[^a-z0-9_]/g, '');
      var label = (params.get('label') || '').slice(0, 80);
      // audio=1 — command-center audio monitor only (loaded behind a user click,
      // so unmuted autoplay is permitted). Displays load without it → stay muted.
      var wantAudio = params.get('audio') === '1';
      // fit=cover fills the frame (no letterbox) — used when this page is a
      // multiview cell; default contain preserves standalone behavior.
      var fit = params.get('fit') === 'cover' ? 'cover' : 'contain';
      var video = document.getElementById('cam');
      var stateEl = document.getElementById('state');
      var stateText = document.getElementById('statetext');
      var labelEl = document.getElementById('label');
      var labelText = document.getElementById('labeltext');
      var lastMediaError = null;

      function playbackState() {
        var duration = Number(video.duration);
        var currentTime = Number(video.currentTime);
        var renderState = lastMediaError
          ? 'error'
          : (video.ended ? 'ended' : (video.paused ? 'paused' : (video.readyState < 3 ? 'loading' : 'playing')));
        var state = {
          content_type: 'video',
          media_type: 'video',
          current_time: Number.isFinite(currentTime) ? currentTime : 0,
          duration: Number.isFinite(duration) ? duration : null,
          paused: video.paused,
          muted: video.muted,
          volume: Number(video.volume),
          render_state: renderState,
          playback_status: renderState,
          error_state: lastMediaError,
        };
        window.__mcTransportState = state;
        return state;
      }

      function notifyParent(kind, payload) {
        if (!window.parent || window.parent === window) return;
        try {
          var message = {};
          message[kind] = payload;
          window.parent.postMessage(message, location.origin);
        } catch (e) {}
      }

      function seekPosition(payload) {
        var secondsRaw = payload.position_seconds ?? payload.position ?? payload.time;
        if (secondsRaw !== undefined && secondsRaw !== null) {
          var seconds = Number(secondsRaw);
          return Number.isFinite(seconds) && seconds >= 0 ? seconds : null;
        }
        var normalizedRaw = payload.position_normalized ?? payload.normalized_position ?? payload.progress;
        var percentRaw = payload.position_percent ?? payload.percent;
        var normalized = normalizedRaw !== undefined && normalizedRaw !== null
          ? Number(normalizedRaw)
          : (percentRaw !== undefined && percentRaw !== null ? Number(percentRaw) / 100 : null);
        var duration = Number(video.duration);
        if (!Number.isFinite(normalized) || normalized < 0 || normalized > 1) return null;
        if (!Number.isFinite(duration) || duration <= 0) return null;
        return normalized * duration;
      }

      function executeTransport(input, reportToParent) {
        var normalized = window.MbfdDeviceContract.normalizeCommand(input, {
          device_id: 'hls-child-player',
          target_scope: 'display',
        });
        if (!normalized.ok) {
          var invalidAck = { ok: false, error: normalized.error, state: playbackState() };
          if (reportToParent) notifyParent('__mc_transport_ack', invalidAck);
          return Promise.resolve(invalidAck);
        }
        var command = normalized.value;
        var action = command.payload.action;
        var operation;
        try {
          if (action === 'play' || (action === 'play_pause' && video.paused)) {
            operation = Promise.resolve(video.play());
          } else if (action === 'pause' || (action === 'play_pause' && !video.paused)) {
            video.pause();
            operation = Promise.resolve();
          } else if (action === 'restart') {
            var start = video.seekable && video.seekable.length ? video.seekable.start(0) : 0;
            video.currentTime = Number.isFinite(start) ? start : 0;
            operation = Promise.resolve(video.play());
          } else if (action === 'seek') {
            var position = seekPosition(command.payload);
            if (position === null) throw new Error('Invalid or unsupported seek target');
            video.currentTime = Math.min(position, Math.max(0, Number(video.duration) - 0.05));
            operation = Promise.resolve();
          } else {
            throw new Error('Unsupported video transport action: ' + action);
          }
        } catch (error) {
          operation = Promise.reject(error);
        }
        return operation.then(function () {
          var ack = { ok: true, error: null, command_id: command.command_id, state: playbackState() };
          if (reportToParent) notifyParent('__mc_transport_ack', ack);
          return ack;
        }).catch(function (error) {
          var ack = {
            ok: false,
            command_id: command.command_id,
            error: error && error.message ? error.message : String(error),
            state: playbackState(),
          };
          if (reportToParent) notifyParent('__mc_transport_ack', ack);
          return ack;
        });
      }

      window.handleAction = function (input) { return executeTransport(input, false); };
      window.addEventListener('message', function (event) {
        if (event.origin !== location.origin || !event.data || !event.data.__mc_transport) return;
        executeTransport(event.data.__mc_transport, true);
      });

      video.style.objectFit = fit;
      if (!station) { stateText.textContent = 'No channel selected.'; return; }
      if (label) { labelText.textContent = label; labelEl.hidden = false; }
      if (wantAudio) { video.muted = false; video.volume = 1; try { video.removeAttribute('muted'); } catch (e) {} }

      // Start playback. If we asked for sound but the browser blocks unmuted
      // autoplay (no user gesture yet), fall back to MUTED so the video still
      // shows — sound then comes back via __mcEnableAudio() once the display's
      // one-time "tap to enable audio" gesture gives the page activation.
      function safePlay() {
        var p = video.play();
        if (p && p.catch) p.catch(function () {
          if (!video.muted) { video.muted = true; var p2 = video.play(); if (p2 && p2.catch) p2.catch(function () {}); }
        });
      }
      // Called by the parent (display player / multiview grid) after a user gesture.
      window.__mcEnableAudio = function () {
        video.muted = false; video.volume = 1;
        try { video.removeAttribute('muted'); } catch (e) {}
        var p = video.play(); if (p && p.catch) p.catch(function () {});
      };

      var hls = null, reresolves = 0, MAX = 5, stallTimer = null, stopped = false;
      // After showing "Reconnecting..." we keep trying every 30 s — live streams
      // go down briefly (CDN origin restarts, midnight slate switches, etc.) and
      // a player that gives up permanently is useless. Reset reresolves so the
      // full resolve→attach cycle repeats.
      var recoveryTimer = null;
      function clearRecovery() { if (recoveryTimer) { clearInterval(recoveryTimer); recoveryTimer = null; } }
      function armRecovery() {
        clearRecovery();
        recoveryTimer = setInterval(function () { reresolves = 0; resolveAndPlay(); }, 30000);
      }
      function showState(on, msg) {
        if (msg) stateText.textContent = msg;
        stateEl.classList.toggle('hide', !on);
        if (on && msg === 'Reconnecting…') armRecovery();
        else clearRecovery();
      }
      function clearStall() { if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; } }
      function armStall() { clearStall(); stallTimer = setTimeout(onStall, 45000); }
      function onPlaying() {
        lastMediaError = null;
        showState(false);
        clearStall();
        reresolves = 0;
        notifyParent('__mc_transport_state', playbackState());
      }
      function onStall() { if (stopped) return; reresolves++; if (reresolves > MAX) { showState(true, 'Reconnecting…'); return; } resolveAndPlay(); }

      function resolveAndPlay() {
        if (stopped) return;
        showState(true, 'Connecting…');
        fetch('news-stream?station=' + encodeURIComponent(station), { cache: 'no-store' })
          .then(function (r) { if (!r.ok) throw new Error('resolve ' + r.status); return r.json(); })
          .then(function (data) { if (!data || !data.source) throw new Error('no source'); attach(data.source); })
          .catch(function () { reresolves++; if (reresolves > MAX) { showState(true, 'Channel unavailable'); return; } setTimeout(resolveAndPlay, 5000); });
      }

      function attach(source) {
        if (hls) { try { hls.destroy(); } catch (e) {} hls = null; }
        if (window.Hls && window.Hls.isSupported()) {
          hls = new window.Hls({ liveSyncDurationCount: 3, manifestLoadingTimeOut: 12000, fragLoadingTimeOut: 20000 });
          hls.loadSource(source);
          hls.attachMedia(video);
          hls.on(window.Hls.Events.MANIFEST_PARSED, function () { safePlay(); armStall(); });
          hls.on(window.Hls.Events.ERROR, function (evt, data) {
            if (data && data.fatal) { armStall(); if (reresolves <= MAX) { reresolves++; setTimeout(resolveAndPlay, 3000); } }
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = source; safePlay(); armStall();
        } else { showState(true, 'HLS not supported'); }
      }

      video.addEventListener('playing', onPlaying);
      video.addEventListener('play', function () { notifyParent('__mc_transport_state', playbackState()); });
      video.addEventListener('pause', function () { notifyParent('__mc_transport_state', playbackState()); });
      video.addEventListener('ended', function () { notifyParent('__mc_transport_state', playbackState()); });
      video.addEventListener('error', function () {
        lastMediaError = video.error
          ? { code: video.error.code, message: video.error.message || 'Video playback failed' }
          : { code: 'video_error', message: 'Video playback failed' };
        notifyParent('__mc_transport_state', playbackState());
      });
      video.addEventListener('waiting', armStall);
      video.addEventListener('stalled', armStall);
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) { clearStall(); if (hls) { try { hls.destroy(); } catch (e) {} hls = null; } }
        else { resolveAndPlay(); }
      });

      resolveAndPlay();
    })();
  </script>
</body>
</html>
