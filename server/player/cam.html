<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Traffic Camera</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #cam { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
    #label {
      position: fixed; left: 0; right: 0; bottom: 0;
      padding: 10px 16px; font-size: 18px; font-weight: 600; color: #fff;
      background: linear-gradient(0deg, rgba(0,0,0,.72), rgba(0,0,0,0));
      text-shadow: 0 1px 3px rgba(0,0,0,.8); pointer-events: none;
      display: flex; align-items: center; gap: 10px;
    }
    #label .dot { width: 9px; height: 9px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    #msg {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      color: #cbd5e1; font-size: 20px; text-align: center; padding: 24px;
    }
    @media (prefers-reduced-motion: reduce) { #label .dot { box-shadow: none; } }
  </style>
</head>
<body>
  <img id="cam" alt="Live traffic camera">
  <div id="label" hidden><span class="dot" aria-hidden="true"></span><span id="labeltext"></span></div>
  <div id="msg">Connecting to camera…</div>
  <script>
    // Self-refreshing FL511 / FDOT District 6 traffic snapshot wrapper.
    //
    // FDOT publishes Miami-Dade causeway/Port cameras only as a JPEG that
    // refreshes ~every 60s (the DIVAS HLS video stream is auth-walled, and the
    // media-control player has no hls.js). A bare .jpg in the player iframe would
    // freeze on one frame; this page reloads the image with a cache-buster so the
    // display shows a live-updating still. Locked to numeric FL511 camera ids — no
    // arbitrary URLs are fetched.
    (function () {
      var params = new URLSearchParams(location.search);
      var id = (params.get('id') || '').replace(/[^0-9]/g, '');
      var label = (params.get('label') || '').slice(0, 80);
      // fit=cover fills the frame (used when this page is a multiview cell that
      // wants no letterbox); default contain preserves standalone behavior.
      var fit = params.get('fit') === 'cover' ? 'cover' : 'contain';
      var REFRESH_MS = 30000; // re-pull twice per source refresh window so a new frame is shown promptly
      var img = document.getElementById('cam');
      var msg = document.getElementById('msg');
      var labelEl = document.getElementById('label');
      var labelText = document.getElementById('labeltext');

      img.style.objectFit = fit;
      if (!id) { msg.textContent = 'No camera selected.'; msg.style.display = 'flex'; return; }
      if (label) { labelText.textContent = label; labelEl.hidden = false; }

      var base = 'https://fl511.com/map/Cctv/' + id;
      var failures = 0;
      var timer = null;

      function load() {
        // Cache-bust so each reload fetches the freshest frame.
        var next = new Image();
        next.onload = function () {
          failures = 0;
          img.src = next.src;
          msg.style.display = 'none';
        };
        next.onerror = function () {
          failures++;
          // Keep the last good frame visible; only show the notice after repeated misses.
          if (failures >= 3 && !img.src) { msg.textContent = 'Camera temporarily unavailable…'; msg.style.display = 'flex'; }
        };
        next.src = base + '?t=' + Date.now();
      }

      load();
      timer = setInterval(load, REFRESH_MS);
      // Pause refresh when the tab/iframe is hidden to save bandwidth; resume on show.
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) { if (timer) { clearInterval(timer); timer = null; } }
        else if (!timer) { load(); timer = setInterval(load, REFRESH_MS); }
      });
    })();
  </script>
</body>
</html>
