<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Control — Presentation</title>
<!-- Served under /player/* which is CSP- and Cloudflare-Access-bypassed, so
     inline CSS/JS is intentional here (this page loads unattended on displays).
     The deck (mbfd-deck-v1) is injected as window.__deck by the server, so no
     authenticated API call is needed. -->
<style>
  :root{
    --slate:#0F172A; --slate2:#1E293B; --ink:#F8FAFC; --muted:#CBD5E1;
    --red:#DC2626; --redrim:rgba(220,38,38,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 120% at 80% 10%, #1E293B 0%, #0F172A 60%, #0B1220 100%);
    color:var(--ink); font-family:'Plus Jakarta Sans','Figtree',system-ui,-apple-system,'Segoe UI',sans-serif;
    overflow:hidden; cursor:default;
  }
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:6vh 8vw}
  .slide{width:100%;max-width:1500px;opacity:0;transition:opacity .35s ease;display:none;flex-direction:column}
  .slide.show{opacity:1;display:flex}
  .kicker{display:inline-flex;align-items:center;gap:10px;color:var(--red);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:1.1vw;margin-bottom:2.2vh}
  .kicker::before{content:'';width:34px;height:4px;border-radius:3px;background:var(--red)}
  h1{font-size:5.2vw;line-height:1.05;font-weight:800;letter-spacing:-.02em}
  h2{font-size:3.6vw;line-height:1.1;font-weight:800;letter-spacing:-.01em;margin-bottom:3vh}
  .subtitle{font-size:2vw;color:var(--muted);margin-top:2.5vh;font-weight:500}
  ul{list-style:none;display:flex;flex-direction:column;gap:1.8vh;margin-top:1vh}
  li{display:flex;gap:1.2vw;align-items:flex-start;font-size:2.1vw;line-height:1.3}
  li::before{content:'';flex:0 0 auto;width:.9vw;height:.9vw;border-radius:50%;background:var(--red);margin-top:1.1vh}
  .body{font-size:2vw;line-height:1.5;color:#E2E8F0;max-width:70%}
  .section{align-items:center;text-align:center}
  .section .bar{width:90px;height:6px;border-radius:4px;background:var(--red);margin:0 auto 4vh}
  .quote{align-items:center;text-align:center}
  .quote .q{font-size:3.4vw;line-height:1.3;font-style:italic;font-weight:600;max-width:80%}
  .title-slide{align-items:flex-start}
  .brand{position:fixed;top:4vh;left:8vw;display:flex;align-items:center;gap:12px;color:var(--muted);font-weight:700;font-size:1.1vw;letter-spacing:.04em}
  .brand .dot{width:14px;height:14px;border-radius:4px;background:var(--red)}
  /* footer / controls */
  #bar{position:fixed;left:0;right:0;bottom:0;height:6px;background:rgba(255,255,255,.08)}
  #fill{height:100%;width:0;background:var(--red);transition:width .25s linear}
  #hud{position:fixed;bottom:2.2vh;right:8vw;color:var(--muted);font-size:1vw;font-variant-numeric:tabular-nums;opacity:.7}
  #dots{position:fixed;bottom:2.2vh;left:8vw;display:flex;gap:8px}
  #dots .d{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.22)}
  #dots .d.on{background:var(--red)}
  #err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;font-size:1.6vw;color:var(--muted);text-align:center;padding:10vw}
</style>
</head>
<body>
  <div class="brand"><span class="dot"></span><span>MBFD MEDIA CONTROL</span></div>
  <div id="stage"></div>
  <div id="dots"></div>
  <div id="hud"></div>
  <div id="bar"><div id="fill"></div></div>
  <div id="err">This presentation is unavailable.</div>
<script>
(function(){
  var deck = window.__deck;
  var stage = document.getElementById('stage');
  if(!deck || !Array.isArray(deck.slides) || !deck.slides.length){ document.getElementById('err').style.display='flex'; return; }
  document.title = (deck.title||'Presentation') + ' — Media Control';
  var slides = deck.slides;
  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

  function buildSlide(s){
    var el = document.createElement('div');
    el.className = 'slide';
    var layout = s.layout||'content';
    var bullets = Array.isArray(s.bullets)?s.bullets:[];
    if(layout==='title'){
      el.classList.add('title-slide');
      el.innerHTML = '<div class="kicker">Media Control Studio</div>'+
        '<h1>'+esc(s.title)+'</h1>'+ (s.subtitle?'<div class="subtitle">'+esc(s.subtitle)+'</div>':'');
    } else if(layout==='section'){
      el.classList.add('section');
      el.innerHTML = '<div class="bar"></div><h1>'+esc(s.title)+'</h1>'+(s.subtitle?'<div class="subtitle">'+esc(s.subtitle)+'</div>':'');
    } else if(layout==='quote'){
      el.classList.add('quote');
      el.innerHTML = '<div class="q">"'+esc(s.body||s.title)+'"</div>'+(s.subtitle?'<div class="subtitle">'+esc(s.subtitle)+'</div>':'');
    } else {
      var inner = '<div class="kicker">'+esc(deck.title||'')+'</div><h2>'+esc(s.title)+'</h2>';
      if(bullets.length){ inner += '<ul>'+bullets.map(function(b){return '<li>'+esc(b)+'</li>';}).join('')+'</ul>'; }
      else if(s.body){ inner += '<div class="body">'+esc(s.body)+'</div>'; }
      el.innerHTML = inner;
    }
    return el;
  }

  slides.forEach(function(s){ stage.appendChild(buildSlide(s)); });
  var els = Array.prototype.slice.call(stage.children);
  var dots = document.getElementById('dots');
  els.forEach(function(_,i){ var d=document.createElement('div'); d.className='d'; dots.appendChild(d); });
  var dotEls = Array.prototype.slice.call(dots.children);
  var hud = document.getElementById('hud');
  var fill = document.getElementById('fill');

  var idx=0, timer=null, t0=0, dur=0, raf=null, paused=false;
  function show(i){
    idx=(i+els.length)%els.length;
    els.forEach(function(e,k){ e.classList.toggle('show', k===idx); });
    dotEls.forEach(function(d,k){ d.classList.toggle('on', k===idx); });
    hud.textContent=(idx+1)+' / '+els.length;
    schedule();
  }
  function schedule(){
    if(timer) clearTimeout(timer);
    if(raf) cancelAnimationFrame(raf);
    if(paused){ return; }
    dur = ((Number(slides[idx] && slides[idx].duration_seconds)>0?Number(slides[idx].duration_seconds):12))*1000;
    t0 = performance.now();
    timer = setTimeout(function(){ show(idx+1); }, dur);
    (function tick(){ var p=Math.min(1,(performance.now()-t0)/dur); fill.style.width=(p*100)+'%'; if(p<1&&!paused) raf=requestAnimationFrame(tick); })();
  }
  function next(){ show(idx+1); }
  function prev(){ show(idx-1); }
  function togglePause(){ paused=!paused; if(paused){ if(timer)clearTimeout(timer); if(raf)cancelAnimationFrame(raf);} else { schedule(); } }

  document.addEventListener('keydown', function(e){
    if(e.key==='ArrowRight'||e.key==='PageDown'){ next(); }
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){ prev(); }
    else if(e.key===' '){ e.preventDefault(); togglePause(); }
    else if(e.key==='f'||e.key==='F'){ if(document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen(); }
  });
  document.addEventListener('click', function(){ next(); });
  show(0);
})();
</script>
</body>
</html>
