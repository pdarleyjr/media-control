<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    Player debug error trap. MUST stay first inside <head> after the two
    mandatory <meta> tags (charset must come first per HTML spec). Runs
    before any other script so we capture errors even from parse-time
    failures in scripts that come after. Vanilla ES5 syntax (var, function,
    no arrow/const/template) so it loads on ancient WebKit forks (Tizen 4,
    older WebOS, Fire TV stick Gen 1, embedded signage browsers). Wrapped
    in defensive try/catch so this script can never be the reason the
    player won't boot.
  -->
  <script>
  (function () {
    try {
      if (!window.__debugLog) window.__debugLog = [];
      var MAX_LOG = 200;
      var INIT_T = (function () { try { return Date.now(); } catch (e) { return new Date().getTime(); } })();

      function nowMs() {
        try { return Date.now(); } catch (e) { return new Date().getTime(); }
      }

      function pushLog(entry) {
        try {
          entry.t = nowMs();
          window.__debugLog.push(entry);
          if (window.__debugLog.length > MAX_LOG) {
            window.__debugLog.splice(0, window.__debugLog.length - MAX_LOG);
          }
        } catch (e) { /* we are the safety net; do not crash */ }
      }
      window.__debugLog_push = pushLog; // shared pusher for debug-overlay.js

      pushLog({
        type: 'init',
        ua: (navigator && navigator.userAgent) || '',
        url: location.href,
        sw: typeof screen !== 'undefined' ? screen.width : null,
        sh: typeof screen !== 'undefined' ? screen.height : null
      });

      // Uncaught script errors. Capture phase so we also see errors from
      // <img>/<script>/<link> resource failures (ev.target.src on those).
      window.addEventListener('error', function (ev) {
        try {
          var src = ev.filename || (ev.target && ev.target.src) || '';
          pushLog({
            type: 'error',
            message: ev.message || (ev.error && String(ev.error)) || 'error',
            source: src,
            line: ev.lineno || 0,
            col: ev.colno || 0,
            stack: (ev.error && ev.error.stack) || ''
          });
        } catch (e) {}
      }, true);

      window.addEventListener('unhandledrejection', function (ev) {
        try {
          var reason = ev.reason;
          pushLog({
            type: 'rejection',
            message: (reason && reason.message) || String(reason || 'rejection'),
            stack: (reason && reason.stack) || ''
          });
        } catch (e) {}
      });

      // Wrap console methods. Original behavior preserved so devtools still
      // sees the real call; we additionally append a sanitized text record.
      var methods = ['log', 'warn', 'error'];
      for (var i = 0; i < methods.length; i++) {
        (function (m) {
          var orig = console[m];
          console[m] = function () {
            try {
              var args = Array.prototype.slice.call(arguments);
              var msg = '';
              for (var j = 0; j < args.length; j++) {
                var part;
                try {
                  part = typeof args[j] === 'string' ? args[j] : JSON.stringify(args[j]);
                } catch (e) {
                  part = String(args[j]);
                }
                msg += (j > 0 ? ' ' : '') + part;
              }
              if (msg.length > 1000) msg = msg.slice(0, 1000) + '...[trunc]';
              pushLog({ type: 'console.' + m, message: msg });
            } catch (e) {}
            try { return orig.apply(console, arguments); } catch (e) {}
          };
        })(methods[i]);
      }

      // Page-load timing relative to this script's execution.
      try {
        document.addEventListener('DOMContentLoaded', function () {
          pushLog({ type: 'timing', event: 'DOMContentLoaded', sinceInit: nowMs() - INIT_T });
        });
        window.addEventListener('load', function () {
          pushLog({ type: 'timing', event: 'load', sinceInit: nowMs() - INIT_T });
        });
      } catch (e) {}
    } catch (outerErr) {
      // If even init failed, the player must still boot. Do nothing.
    }
  })();
  </script>
  <!-- Debug overlay module (section 2). Defers so HTML parse doesn't block
       on the fetch. Auto-activation check fires after DOMContentLoaded;
       few-ms delay vs the inline trap is fine since errors before this
       loads are already captured in __debugLog by the inline trap above. -->
  <script src="/player/debug-overlay.js" defer></script>
  <title>Media Control Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }

    /* Setup Screen */
    #setupScreen {
      position: fixed; inset: 0; background: #111827; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 1000; color: #f1f5f9;
    }
    #setupScreen h1 { font-size: clamp(24px, 5vw, 48px); color: #3b82f6; margin-bottom: max(8px, 1vh); }
    #setupScreen .subtitle { color: #94a3b8; font-size: clamp(12px, 2vw, 24px); margin-bottom: max(48px, 5vh); }
    #setupScreen .form { width: 90vw; max-width: clamp(300px, 90vw, 500px); }
    #setupScreen label { display: block; font-size: clamp(11px, 1.5vw, 16px); color: #94a3b8; margin-bottom: max(8px, 0.8vh); }
    #setupScreen input { width: 100%; padding: clamp(8px, 1.5vw, 16px); background: #0f172a; border: 1px solid #334155;
      border-radius: max(6px, 0.5vmin); color: #f1f5f9; font-size: clamp(13px, 1.8vw, 18px); margin-bottom: max(24px, 2.5vh); outline: none; }
    #setupScreen input:focus { border-color: #3b82f6; }
    #setupScreen button { width: 100%; padding: clamp(10px, 1.5vw, 16px); background: #3b82f6; color: white;
      border: none; border-radius: max(6px, 0.5vmin); font-size: clamp(14px, 1.8vw, 18px); font-weight: 600; cursor: pointer; }
    #setupScreen button:hover { background: #2563eb; }
    #setupScreen button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pairing-code { font-size: clamp(48px, 8vw, 96px); font-weight: 700; color: #3b82f6; font-family: monospace;
      letter-spacing: max(8px, 1vw); margin: max(24px, 2.5vh) 0; }
    .pairing-hint { color: #64748b; font-size: clamp(12px, 1.5vw, 16px); }
    .status-msg { color: #94a3b8; font-size: clamp(12px, 1.5vw, 18px); margin-top: max(16px, 1.5vh); }
    .spinner { width: clamp(30px, 5vw, 60px); height: clamp(30px, 5vw, 60px); border: max(2px, 0.3vmin) solid #334155; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 1s linear infinite; margin: max(24px, 2.5vh) auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Player */
    #playerContainer { position: fixed; inset: 0; background: #000; }
    /* Fullscreen single-zone playback: YouTube's IFrame API measures the placeholder
       at construction time. If that happens before layout settles, YT bakes in a
       300x150 fallback as inline pixel dimensions on the iframe, which our %-based
       rules can't override. Force fullscreen via absolute positioning + !important. */
    #playerContainer > iframe,
    #playerContainer > div > iframe {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      border: none !important; display: block !important;
    }
    .zone { position: absolute; overflow: hidden; }
    .zone video { width: 100%; height: 100%; object-fit: cover; }
    .zone img { width: 100%; height: 100%; object-fit: cover; }
    .zone iframe { width: 100%; height: 100%; border: none; }

    /* Video wall mode.
       wall-stage maps the wall's player_rect into this device's viewport
       using vw/vh — so the device fills its full viewport edge-to-edge
       (no pillarbox at the seam between adjacent screens).
       object-fit:fill is the operator-confirmed wallpaper behavior for a
       video wall: source stretches exactly to the composite rectangle, edge-
       to-bezel with NO letterbox and NO crop. Alignment across tiles is
       preserved because the stage is a SINGLE element sized to the whole
       composite box (player_rect) and clipped per-screen by viewport — a
       crop like 'cover' would over-zoom non-matching-aspect images. */
    #playerContainer.wall-mode { overflow: hidden; background: #000; }
    .wall-stage { position: absolute; }
    .wall-stage > video,
    .wall-stage > img { width: 100%; height: 100%; object-fit: fill; display: block; }
    .wall-stage > iframe { width: 100%; height: 100%; border: none; display: block; }
    .wall-mode #playerContainer > iframe,
    .wall-mode #playerContainer > div > iframe { position: static !important; width: 100% !important; height: 100% !important; }

    /* Status overlay */
    #statusOverlay {
      position: fixed; inset: 0; background: #000; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #94a3b8; z-index: 500;
    }
    #statusOverlay h2 { color: #3b82f6; font-size: clamp(20px, 3.5vw, 40px); margin-bottom: max(8px, 1vh); }
    #statusOverlay p { font-size: clamp(14px, 2vw, 22px); }

    .calibration-overlay {
      position: fixed; inset: 0; z-index: 12000; pointer-events: none;
      color: #fff; background:
        linear-gradient(rgba(255,255,255,0.34) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.34) 1px, transparent 1px),
        linear-gradient(rgba(59,130,246,0.58) 2px, transparent 2px),
        linear-gradient(90deg, rgba(59,130,246,0.58) 2px, transparent 2px),
        rgba(0,0,0,0.38);
      background-size: 5vw 5vh, 5vw 5vh, 25vw 25vh, 25vw 25vh, auto;
      box-shadow: inset 0 0 0 max(4px,0.4vmin) #fff, inset 0 0 0 max(10px,1vmin) #2563eb;
    }
    .calibration-overlay::before,
    .calibration-overlay::after {
      content: ''; position: absolute; background: #ef4444; box-shadow: 0 0 max(8px,1vmin) rgba(0,0,0,0.75);
    }
    .calibration-overlay::before { left: 50%; top: 0; bottom: 0; width: max(3px,0.25vmin); transform: translateX(-50%); }
    .calibration-overlay::after { top: 50%; left: 0; right: 0; height: max(3px,0.25vmin); transform: translateY(-50%); }
    .calibration-info {
      position: absolute; left: max(18px,2vmin); top: max(18px,2vmin); right: max(18px,2vmin);
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: max(8px,1vmin);
      font: 700 clamp(14px, 2.2vw, 34px) / 1.15 sans-serif; text-shadow: 0 2px 8px #000;
    }
    .calibration-info span { display: block; padding: max(8px,1vmin) max(12px,1.4vmin); background: rgba(0,0,0,0.78); border: 2px solid rgba(255,255,255,0.86); border-radius: max(6px,0.8vmin); }
    .calibration-corner { position: absolute; width: max(54px,6vmin); height: max(54px,6vmin); border-color: #f97316; border-style: solid; }
    .calibration-corner.tl { left: 0; top: 0; border-width: max(8px,0.8vmin) 0 0 max(8px,0.8vmin); }
    .calibration-corner.tr { right: 0; top: 0; border-width: max(8px,0.8vmin) max(8px,0.8vmin) 0 0; }
    .calibration-corner.bl { left: 0; bottom: 0; border-width: 0 0 max(8px,0.8vmin) max(8px,0.8vmin); }
    .calibration-corner.br { right: 0; bottom: 0; border-width: 0 max(8px,0.8vmin) max(8px,0.8vmin) 0; }
  </style>

<script>
// Expose the player's socket to the screen-share receiver. The player JS
// calls io('/device', ...) - we monkey-patch io() so the resulting Manager's
// /device namespace socket is captured on window.__playerSocket.
(function () {
  if (!window.io) return;
  var origIo = window.io;
  window.io = function () {
    var s = origIo.apply(this, arguments);
    if (arguments[0] === '/device' || (s && s.nsp === '/device')) {
      window.__playerSocket = s;
    }
    return s;
  };
  Object.keys(origIo).forEach(function (k) { window.io[k] = origIo[k]; });
})();
</script>

        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
      } catch(e) { console.warn('Audio unlock failed:', e); }

      if (isWallFollower()) return;

            ctx.lineTo(x1, y1);
          } else if (stroke.tool === 'rect') {
            ctx.rect(Math.min(x0, x1), Math.min(y0, y1), Math.abs(x1 - x0), Math.abs(y1 - y0));
          } else { // ellipse, bounding-box center fit
            var cx = (x0 + x1) / 2;
            var cy = (y0 + y1) / 2;
            var rx = Math.max(0.5, Math.abs(x1 - x0) / 2);
            var ry = Math.max(0.5, Math.abs(y1 - y0) / 2);
            ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
          }
          ctx.stroke();
          ctx.restore();
          return;
        }

        // ----- Ink tools: pen / highlighter / eraser -----
        if (tool === 'eraser') {
          ctx.globalCompositeOperation = 'destination-out';
          ctx.globalAlpha = 1;
          ctx.strokeStyle = 'rgba(0,0,0,1)';
          ctx.lineWidth = baseSize * 2.5;
        } else if (tool === 'highlighter') {
          ctx.globalCompositeOperation = 'source-over';
          ctx.globalAlpha = 0.35;
          ctx.strokeStyle = color;
          ctx.lineWidth = baseSize * 2.5;
        } else {
          ctx.globalCompositeOperation = 'source-over';
          ctx.globalAlpha = 1;
          ctx.strokeStyle = color;
          ctx.lineWidth = baseSize;
        }

        if (pts.length === 1) {
          // A single tap → draw a dot of the right thickness.
          const r = Math.max(0.5, ctx.lineWidth / 2);
          ctx.beginPath();
          ctx.fillStyle = (tool === 'eraser') ? 'rgba(0,0,0,1)' : color;
          ctx.arc(px(pts[0]), py(pts[0]), r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.moveTo(px(pts[0]), py(pts[0]));
          // Quadratic curve through midpoints for smoothing.
          for (let i = 1; i < pts.length - 1; i++) {
            const cx = px(pts[i]);
            const cy = py(pts[i]);
            const mx = (cx + px(pts[i + 1])) / 2;
            const my = (cy + py(pts[i + 1])) / 2;
            ctx.quadraticCurveTo(cx, cy, mx, my);
          }
          // Final segment to the last point.
          ctx.lineTo(px(pts[pts.length - 1]), py(pts[pts.length - 1]));
          ctx.stroke();
        }
        ctx.restore();
      } catch (e) { /* never break playback */ }
    }

    function wbStoreStroke(stroke) {
      if (!stroke || !Array.isArray(stroke.points) || stroke.points.length === 0) return;
      if (stroke.stroke_id) {
        const existing = _wb.strokes.find(s => s && s.stroke_id === stroke.stroke_id);
        if (existing) {
          existing.points = (existing.points || []).concat(stroke.points || []);
          existing.color = stroke.color;
          existing.size = stroke.size;
          existing.tool = stroke.tool;
          existing.phase = stroke.phase;
          return;
        }
      }
      _wb.strokes.push(stroke);
    }

    function wbSetTool(tool) {
      _wb.tool = (tool === 'highlighter' || tool === 'eraser') ? tool : 'pen';
      if (!_wb.toolbar) return;
      _wb.toolbar.querySelectorAll('[data-wb-tool]').forEach(function (btn) {
        const active = btn.getAttribute('data-wb-tool') === _wb.tool;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    function wbBuildToolbar() {
      if (!_wb.overlay || _wb.toolbar) return;
      const bar = document.createElement('div');
      bar.id = 'smartboardNativeToolbar';
      bar.style.cssText = 'position:absolute;left:max(32px,2vw);right:max(32px,2vw);bottom:max(32px,3vh);' +
        'min-height:64px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;' +
        'font-family:-apple-system,BlinkMacSystemFont,sans-serif;pointer-events:auto;z-index:2;' +
        'padding:10px 14px;border-radius:24px;background:rgba(15,23,42,0.76);backdrop-filter:none;' +
        'box-shadow:0 10px 30px rgba(0,0,0,0.26)';
      const mkBtn = function (text, attrs, danger) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = text;
        Object.keys(attrs || {}).forEach(k => btn.setAttribute(k, attrs[k]));
        btn.style.cssText = 'min-width:64px;min-height:64px;padding:0 22px;border-radius:18px;border:1px solid rgba(255,255,255,0.24);' +
          'background:' + (danger ? 'rgba(239,68,68,0.92)' : 'rgba(30,41,59,0.96)') + ';color:#fff;font-size:20px;font-weight:800;' +
          'touch-action:manipulation;-webkit-tap-highlight-color:transparent';
        return btn;
      };
      bar.appendChild(mkBtn('Pen', { 'data-wb-tool': 'pen', 'aria-pressed': 'true' }));
      bar.appendChild(mkBtn('Highlighter', { 'data-wb-tool': 'highlighter', 'aria-pressed': 'false' }));
      bar.appendChild(mkBtn('Eraser', { 'data-wb-tool': 'eraser', 'aria-pressed': 'false' }));
      bar.appendChild(mkBtn('Undo', { 'data-wb-action': 'undo' }));
      bar.appendChild(mkBtn('Clear', { 'data-wb-action': 'clear' }, true));
      bar.appendChild(mkBtn('Close', { 'data-wb-action': 'stop' }));
      bar.querySelectorAll('[data-wb-tool]').forEach(btn => btn.addEventListener('click', () => wbSetTool(btn.getAttribute('data-wb-tool'))));
      bar.querySelector('[data-wb-action="undo"]').addEventListener('click', () => {
        if (_wb.strokes.length > 0) _wb.strokes.pop();
        wbRedrawAll();
        if (socket?.connected) socket.emit('device:wb-undo', {});
      });
      bar.querySelector('[data-wb-action="clear"]').addEventListener('click', () => {
        _wb.strokes = [];
        wbRedrawAll();
        if (socket?.connected) socket.emit('device:wb-clear', {});
      });
      bar.querySelector('[data-wb-action="stop"]').addEventListener('click', () => wbStop());
      _wb.toolbar = bar;
      _wb.overlay.appendChild(bar);
      wbSetTool(_wb.tool);
    }

    function wbPointFromEvent(e) {
      const rect = _wb.canvas.getBoundingClientRect();
      return {
        x: Math.max(0, Math.min(1, (e.clientX - rect.left) / (rect.width || 1))),
        y: Math.max(0, Math.min(1, (e.clientY - rect.top) / (rect.height || 1))),
      };
    }

    function wbNativeDown(e) {
      if (!_wb.nativeTouch || _wb.drawing || !_wb.canvas) return;
      if (e.target && e.target.closest && e.target.closest('#smartboardNativeToolbar')) return;
      _wb.drawing = true;
      _wb.activePointerId = e.pointerId;
      _wb.liveStrokeId = 'native-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
      _wb.livePoints = [wbPointFromEvent(e)];
      try { _wb.canvas.setPointerCapture(e.pointerId); } catch (_) {}
      wbDrawStroke({ points: _wb.livePoints, color: _wb.color, size: _wb.size, tool: _wb.tool });
      e.preventDefault();
    }

    function wbNativeMove(e) {
      if (!_wb.nativeTouch || !_wb.drawing || e.pointerId !== _wb.activePointerId) return;
      _wb.livePoints.push(wbPointFromEvent(e));
      wbRedrawAll();
      wbDrawStroke({ points: _wb.livePoints, color: _wb.color, size: _wb.size, tool: _wb.tool });
      e.preventDefault();
    }

    function wbNativeUp(e) {
      if (!_wb.nativeTouch || !_wb.drawing || (e.pointerId != null && e.pointerId !== _wb.activePointerId)) return;
      try { _wb.canvas.releasePointerCapture(_wb.activePointerId); } catch (_) {}
      const stroke = { points: _wb.livePoints.slice(), color: _wb.color, size: _wb.size, tool: _wb.tool, stroke_id: _wb.liveStrokeId, phase: 'end' };
      wbStoreStroke(stroke);
      wbRedrawAll();
      if (socket?.connected) socket.emit('device:wb-stroke', { stroke });
      _wb.drawing = false;
      _wb.activePointerId = null;
      _wb.liveStrokeId = null;
      _wb.livePoints = [];
      e.preventDefault();
    }

    function wbApplyNativeTouch(enabled) {
      _wb.nativeTouch = !!enabled;
      if (!_wb.overlay || !_wb.canvas) return;
      _wb.overlay.style.pointerEvents = _wb.nativeTouch ? 'auto' : 'none';
      _wb.canvas.style.pointerEvents = _wb.nativeTouch ? 'auto' : 'none';
      _wb.canvas.style.touchAction = _wb.nativeTouch ? 'none' : 'auto';
      _wb.overlay.classList.toggle('native-touch', _wb.nativeTouch);
      if (_wb.nativeTouch) wbBuildToolbar();
      else if (_wb.toolbar) { _wb.toolbar.remove(); _wb.toolbar = null; }
    }

    // Clear the canvas and replay every stroke in order (used after resize/undo).
    function wbRedrawAll() {
      try {
        if (!_wb.ctx || !_wb.canvas) return;
        _wb.ctx.save();
        _wb.ctx.setTransform(1, 0, 0, 1, 0, 0);
        _wb.ctx.clearRect(0, 0, _wb.canvas.width, _wb.canvas.height);
        _wb.ctx.restore();
        for (let i = 0; i < _wb.strokes.length; i++) {
          wbDrawStroke(_wb.strokes[i]);
        }
      } catch (e) { /* never break playback */ }
    }

    function wbApplyMode(mode) {
      _wb.mode = mode === 'blank' ? 'blank' : 'overlay';
      if (_wb.overlay) {
        _wb.overlay.style.background = _wb.mode === 'blank' ? '#ffffff' : 'transparent';
        const label = _wb.overlay.querySelector('#smartboardLabel');
        if (label) label.textContent = _wb.mode === 'blank' ? 'Blank whiteboard' : 'Annotating live content';
      }
    }

    // Create the fullscreen whiteboard overlay (idempotent). Overlay mode leaves
    // playback visible; blank mode supplies a clean white drawing surface.
    function wbShow(options) {
      try {
        const initialStrokes = Array.isArray(options && options.strokes) ? options.strokes : null;
        const nativeTouch = classroomSmartboardTouchEnabled(options || {});
        if (_wb.overlay) {
          if (initialStrokes) {
            _wb.strokes = initialStrokes.slice();
            wbRedrawAll();
          }
          wbApplyNativeTouch(nativeTouch);
          wbApplyMode(options && options.mode);
          return;
        }
        const ov = document.createElement('div');
        ov.id = 'smartboardOverlay';
        ov.style.cssText = 'position:fixed;inset:0;z-index:2147483646;' +
          'background:transparent;pointer-events:none;overflow:hidden';

        const canvas = document.createElement('canvas');
        canvas.id = 'smartboardCanvas';
        canvas.style.cssText = 'position:absolute;top:0;left:0;' +
          'pointer-events:none;display:block';

        const label = document.createElement('div');
        label.id = 'smartboardLabel';
        label.style.cssText = 'position:absolute;top:max(12px,1.2vh);left:max(16px,1.5vw);' +
          'font-family:-apple-system,sans-serif;font-size:clamp(11px,1.3vw,15px);font-weight:700;' +
          'letter-spacing:max(0.3px,0.05vw);color:#fff;background:rgba(16,21,28,0.7);' +
          'padding:max(3px,0.3vh) max(8px,1vw);border-radius:999px;' +
          'pointer-events:none;user-select:none';
        label.textContent = 'Annotating live content';

        ov.appendChild(canvas);
        ov.appendChild(label);
        document.body.appendChild(ov);

        _wb.overlay = ov;
        _wb.canvas = canvas;
        _wb.ctx = canvas.getContext('2d');
        _wb.strokes = initialStrokes ? initialStrokes.slice() : [];
        wbApplyMode(options && options.mode);
        wbFitCanvas();
        wbRedrawAll();
        wbApplyNativeTouch(nativeTouch);
        canvas.addEventListener('pointerdown', wbNativeDown);
        canvas.addEventListener('pointermove', wbNativeMove);
        canvas.addEventListener('pointerup', wbNativeUp);
        canvas.addEventListener('pointercancel', wbNativeUp);

        _wb.resizeHandler = function () {
          wbFitCanvas();
          wbRedrawAll();
        };
        window.addEventListener('resize', _wb.resizeHandler);
        window.addEventListener('orientationchange', _wb.resizeHandler);
      } catch (e) { /* never break playback */ }
    }

    // Tear down the whiteboard overlay and revert to normal playback.
    function wbStop() {
      try {
        if (_wb.resizeHandler) {
          window.removeEventListener('resize', _wb.resizeHandler);
          window.removeEventListener('orientationchange', _wb.resizeHandler);
          _wb.resizeHandler = null;
        }
        if (_wb.canvas) {
          _wb.canvas.removeEventListener('pointerdown', wbNativeDown);
          _wb.canvas.removeEventListener('pointermove', wbNativeMove);
          _wb.canvas.removeEventListener('pointerup', wbNativeUp);
          _wb.canvas.removeEventListener('pointercancel', wbNativeUp);
        }
        if (_wb.overlay) _wb.overlay.remove();
        _wb.overlay = null;
        _wb.canvas = null;
        _wb.ctx = null;
        _wb.toolbar = null;
        _wb.nativeTouch = false;
        _wb.mode = 'overlay';
        _wb.drawing = false;
        _wb.activePointerId = null;
        _wb.livePoints = [];
        _wb.strokes = [];
      } catch (e) { /* never break playback */ }
    }

    // ==================== Socket Connection ====================
    function connect(serverUrl) {
      if (socket) { socket.disconnect(); socket = null; }

      socket = io(serverUrl + '/device', {
        reconnection: true,
        reconnectionAttempts: Infinity,
        reconnectionDelay: 2000,
        reconnectionDelayMax: 10000,
        timeout: 20000,
        // Prefer WebSocket but allow polling fallback. Socket.IO default is
        // polling-first with an upgrade dance that's fragile on TV WebKits
        // (LG webOS especially). Reversing the order opens a WebSocket directly;
        // if that fails (rare - blocked by firewall), it falls back to polling
        // on the same connect attempt. Tradeoff: WS-blocked networks add a few
        // seconds to first connect while WS times out. Worth it for the common
        // case where WS is fine but the upgrade dance was hanging the device.
        transports: ['websocket', 'polling'],
      });

      socket.on('connect', () => {
        console.log('Connected');
        // Clear any "reconnecting" overlay shown on disconnect/connect_error.
        try { hideStatus(); } catch (e) { /* best-effort */ }
        register();
      });

      socket.on('disconnect', () => {
        console.log('Disconnected');
        stopHeartbeat();
        // Show a visible "reconnecting" overlay instead of a blank/frozen page.
        // Socket.io auto-reconnects underneath; this just tells a human (or a
        // glance at the wall) that the control channel dropped and is retrying.
        try {
          showStatus(_t('connecting'));
          document.getElementById('statusText').textContent = _t('connecting') + ' (reconnecting)';
        } catch (e) { /* overlay is best-effort */ }
      });

      socket.on('connect_error', (err) => {
        document.getElementById('setupStatus').textContent = 'Connection failed: ' + err.message;
        document.getElementById('setupSpinner').style.display = 'none';
        document.getElementById('connectBtn').disabled = false;
        // For a paired/managed kiosk display, surface a non-blank "Connecting to
        // Media Control..." overlay so a dead server doesn't leave the wall black.
        try {
          if (config.paired) {
            showStatus(_t('connecting'));
            document.getElementById('statusText').textContent = 'Connecting to Media Control...';
          }
        } catch (e) { /* overlay is best-effort */ }
      });

      socket.on('device:registered', (data) => {
        config.deviceId = data.device_id;
        if (data.device_token) config.deviceToken = data.device_token;
        saveConfig(config);
        console.log('Registered:', data.device_id);

        if (!config.paired) {
          // Show pairing code
          document.getElementById('urlForm').style.display = 'none';
          document.getElementById('setupSpinner').style.display = 'none';
          document.getElementById('pairingSection').style.display = 'block';
          document.getElementById('pairingCode').textContent = config.pairingCode || '------';
          document.getElementById('setupStatus').textContent = '';
        }

        startHeartbeat();
        startPlaylistRefresh();
        startVersionCheck();

        // Phase 2: report this display's viewport/resolution/orientation/
        // capabilities so the dashboard can show per-display info.
        emitDisplayViewport();
      });

      socket.on('device:paired', (data) => {
        config.paired = true;
        config.deviceName = data.name;
        saveConfig(config);
        console.log('Paired as:', data.name);
        document.getElementById('setupScreen').style.display = 'none';
        showStatus('Waiting for content...');
      });

      socket.on('device:unpaired', () => {
        console.warn('Device not found on server — clearing credentials');
        delete config.deviceId;
        delete config.deviceToken;
        config.paired = false;
        saveConfig(config);
        savePlaylistCache([]);
        document.getElementById('setupScreen').style.display = 'flex';
        document.getElementById('urlForm').style.display = 'block';
        document.getElementById('pairingSection').style.display = 'none';
        document.getElementById('setupStatus').textContent = 'Device was removed from server. Please reconnect.';
      });

      socket.on('device:auth-error', (data) => {
        console.warn('Device auth rejected:', data?.error || 'unknown');
        delete config.deviceId;
        delete config.deviceToken;
        config.paired = false;
        saveConfig(config);
        document.getElementById('setupScreen').style.display = 'flex';
        document.getElementById('urlForm').style.display = 'block';
        // 2026-05-28: previously this hid pairingSection and only showed a
        // status text, leaving the operator with no way to recover on a Fire
        // TV (no keyboard for Escape, the "re-pair" wording with nothing to
        // click). Now: if we still have a cached pairingCode, surface it; if
        // not, generate a fresh one and re-register immediately so the user
        // can claim the device from the dashboard /devices "Unassigned" tab.
        const setupStatus = document.getElementById('setupStatus');
        const pairingSection = document.getElementById('pairingSection');
        setupStatus.textContent = 'Authentication failed — enter the code below on the dashboard.';
        let code = config.pairingCode;
        if (!code) {
          code = String(Math.floor(100000 + Math.random() * 900000));
          config.pairingCode = code;
          saveConfig(config);
        }
        const pairingCodeEl = document.getElementById('pairingCode');
        if (pairingCodeEl) pairingCodeEl.textContent = code;
        if (pairingSection) pairingSection.style.display = 'block';
        // Re-register with the pairing code so the server creates a fresh
        // device row that an admin can claim. Without this, the player would
        // sit dead waiting for the user to "re-pair" by hand.
        try {
          if (socket && socket.connected) {
            socket.emit('device:register', {
              pairing_code: code,
              fingerprint: getFingerprint?.(),
              device_info: getDeviceInfo?.(),
            });
          }
        } catch (e) { console.warn('Auto re-register after auth-error failed:', e?.message || e); }
      });

      socket.on('device:playlist-update', (data) => {
        console.log('Playlist update:', data.assignments?.length, 'items');
        handlePlaylistUpdate(data);
        // Refresh the dashboard preview after the new media has painted. The
        // later pass covers document conversion/iframe startup without making
        // drag-drop wait on a screenshot round-trip.
        setTimeout(captureAndSend, 1200);
        setTimeout(captureAndSend, 6000);
      });

      // Video wall sync (leader broadcasts; followers align)
      socket.on('wall:sync', (data) => {
        if (!wallConfig || wallConfig.is_leader) return;
        if (data.wall_id !== wallConfig.wall_id) return;
        lastWallSync = data;
        // If leader switched item, jump to it. If the leader's content_id does
        // not match the follower's item at the same index, hold position and
        // request a fresh payload instead of playing the wrong wall tile.
        if (typeof data.current_index === 'number' && data.current_index !== currentIndex && playlist.length > 0) {
          const targetIndex = ((data.current_index % playlist.length) + playlist.length) % playlist.length;
          const targetItem = playlist[targetIndex] || {};
          if (data.content_id && targetItem.content_id && data.content_id !== targetItem.content_id) {
            console.warn('[wall] sync content mismatch leader=' + data.content_id + ' local=' + targetItem.content_id + ' index=' + targetIndex);
            if (socket?.connected) socket.emit('wall:sync-request', { wall_id: wallConfig.wall_id });
          } else {
            const startInMs = Number(data.start_in_ms);
            pendingWallStartAt = Number.isFinite(startInMs) && startInMs > 50
              ? Date.now() + Math.min(2000, Math.max(0, startInMs))
              : 0;
            currentIndex = targetIndex;
            playCurrentItem();
          }
        }
        // YouTube follower alignment. The IFrame API has no playbackRate so
        // we can't nudge gently; we hard-seek on any non-trivial drift. Also
        // forcibly resume playback if the embed is stuck in UNSTARTED (-1),
        // PAUSED (2), or CUED (5) — Silk Browser's autoplay policy on Fire
        // TV is one of the reasons a follower can land in CUED.
        if (activeYtPlayer && typeof data.position_sec === 'number' &&
            typeof activeYtPlayer.getCurrentTime === 'function') {
          try {
            const now = Date.now();
            const latency = data.sent_at ? Math.min(2, Math.max(0, (now - data.sent_at) / 1000)) : 0;
            const target = data.position_sec + latency;
            const ytTime = activeYtPlayer.getCurrentTime() || 0;
            if (Math.abs(ytTime - target) > 1.5) {
              activeYtPlayer.seekTo(target, true);
            }
            const state = activeYtPlayer.getPlayerState ? activeYtPlayer.getPlayerState() : -1;
            // YT.PlayerState: -1=unstarted, 0=ended, 1=playing, 2=paused, 3=buffering, 5=cued
            if (state === -1 || state === 2 || state === 5) {
              activeYtPlayer.playVideo();
            }
          } catch (_) { /* tolerated — followers retry every sync tick */ }
        }
        // Hold the follower close to the leader's clock. Account for relay
        // latency: the leader was at position_sec when sent_at was stamped;
        // by now a bit more time has elapsed, so target = position + latency.
        if (currentVideoEl && typeof data.position_sec === 'number') {
          const now = Date.now();
          const latency = data.sent_at ? Math.min(2, Math.max(0, (now - data.sent_at) / 1000)) : 0;
          const target = data.position_sec + latency;
          const drift = (currentVideoEl.currentTime || 0) - target;
          const absDrift = Math.abs(drift);
          if (absDrift > 0.3 && isFinite(currentVideoEl.duration) && target < currentVideoEl.duration) {
            // Big drift: hard seek and reset rate.
            try { currentVideoEl.currentTime = target; } catch (_) {}
            try { currentVideoEl.playbackRate = 1.0; } catch (_) {}
          } else if (absDrift > 0.05) {
            // Small drift: nudge playbackRate to converge gently. ±3% is
            // imperceptible on most content but pulls in 50ms drift in <2s.
            const rate = drift > 0 ? 0.97 : 1.03;
            try { if (Math.abs((currentVideoEl.playbackRate || 1) - rate) > 0.001) currentVideoEl.playbackRate = rate; } catch (_) {}
          } else if (currentVideoEl.playbackRate !== 1.0) {
            // In-window: ride at normal rate.
            try { currentVideoEl.playbackRate = 1.0; } catch (_) {}
          }
        }
      });

      // Leader receives a sync-request from a (re)connecting follower and
      // immediately broadcasts its position so the requester can align without
      // waiting for the next periodic tick.
      socket.on('wall:sync-request', (data) => {
        if (!wallConfig?.is_leader) return;
        if (data?.wall_id && data.wall_id !== wallConfig.wall_id) return;
        console.log('[wall] sync-request received from ' + data?.requested_by + ', broadcasting current position');
        emitWallSync();
      });

      socket.on('device:screenshot-request', () => { console.log('Screenshot requested'); captureAndSend(); });
      socket.on('device:remote-start', () => { console.log('Remote start received'); remoteStreaming = true; startStreaming(); });
      socket.on('device:remote-stop', () => { console.log('Remote stop received'); remoteStreaming = false; stopStreaming(); });

      socket.on('device:remote-touch', (data) => {
        // Simulate click at normalized coordinates within the player
        const container = document.getElementById('playerContainer');
        if (!container) return;
        const x = data.x * container.offsetWidth;
        const y = data.y * container.offsetHeight;
        const el = document.elementFromPoint(x, y);
        if (el) el.click();
        console.log('Touch:', data.x, data.y, '-> element:', el?.tagName);
      });

      socket.on('device:remote-key', (data) => {
        console.log('Key:', data.keycode);
        const video = document.querySelector('#playerContainer video');
        switch (data.keycode) {
          case 'KEYCODE_DPAD_RIGHT':
            // Skip to next content
            nextItem();
            break;
          case 'KEYCODE_DPAD_LEFT':
            // Go to previous content
            currentIndex = (currentIndex - 2 + playlist.length) % playlist.length;
            nextItem();
            break;
          case 'KEYCODE_DPAD_CENTER':
          case 'KEYCODE_ENTER':
            // Toggle play/pause
            if (video) { video.paused ? video.play() : video.pause(); }
            break;
          case 'KEYCODE_VOLUME_UP':
            // Wall followers ignore volume changes — they stay silent.
            if (video && !isWallFollower()) { video.volume = Math.min(1, video.volume + 0.1); video.muted = false; publishPlayerState(); }
            break;
          case 'KEYCODE_VOLUME_DOWN':
            if (video) { video.volume = Math.max(0, video.volume - 0.1); publishPlayerState(); }
            break;
          case 'KEYCODE_MENU':
            // Toggle mute (followers can't unmute)
            if (video && !(isWallFollower() && video.muted)) { video.muted = !video.muted; publishPlayerState(); }
            break;
          case 'KEYCODE_HOME':
            // Go back to first item
            currentIndex = -1;
            nextItem();
            break;
          case 'KEYCODE_BACK':
            // Show/hide status overlay with device info
            const overlay = document.getElementById('infoOverlay');
            if (overlay) { overlay.style.display = overlay.style.display === 'none' ? 'flex' : 'none'; }
            break;
          case 'KEYCODE_POWER':
            // Toggle screen (show black overlay)
            toggleScreenOff();
            break;
        }
      });

      socket.on('device:command', (data) => {
        const command = normalizeTransportCommand(data);
        const action = command.action;
        console.log('Command:', action, command.command_id || '');
        if (action === 'refresh') {
          finishTransportCommand(command, true, null, buildPlayerState());
          setTimeout(() => location.reload(), 50);
        }
        else if (action === 'launch') {
          document.getElementById('screenOffOverlay')?.remove();
          finishTransportCommand(command, true, null, buildPlayerState());
        }
        else if (action === 'screen_off') {
          toggleScreenOff();
          finishTransportCommand(command, true, null, buildPlayerState());
        }
        else if (action === 'screen_on') {
          document.getElementById('screenOffOverlay')?.remove();
          finishTransportCommand(command, true, null, buildPlayerState());
        }
        else {
          _showTransportDebug('recv: ' + action + (command.command_id ? ' #' + String(command.command_id).slice(0, 8) : ''));
          doTransport(command);
        }
      });

      // ── Transport debug overlay ──────────────────────────────────────────
      // A small persistent status line at the top of the screen that shows the
      // last transport command received and its result. This is VISIBLE on the
      // actual TV so the operator can confirm commands are arriving without
      // needing DevTools. Auto-fades after 5 seconds.
      var _tdEl = null;
      var _tdTimer = null;
      function _showTransportDebug(msg) {
        if (!_tdEl) {
          _tdEl = document.createElement('div');
          _tdEl.style.cssText = 'position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(0,0,0,0.85);color:#22c55e;font:700 14px/1.4 monospace;padding:4px 12px;border-radius:0 0 8px 8px;border:2px solid #22c55e;border-top:none;pointer-events:none;transition:opacity 0.3s;max-width:90vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
          document.body.appendChild(_tdEl);
        }
        _tdEl.textContent = '[MC] ' + msg;
        _tdEl.style.opacity = '1';
        _tdEl.style.color = '#22c55e';
        _tdEl.style.borderColor = '#22c55e';
        if (_tdTimer) clearTimeout(_tdTimer);
        _tdTimer = setTimeout(function() { _tdEl.style.opacity = '0'; }, 5000);
      }
      function _showTransportError(msg) {
        _showTransportDebug('ERROR: ' + msg);
        if (_tdEl) { _tdEl.style.color = '#ef4444'; _tdEl.style.borderColor = '#ef4444'; }
        console.error('[transport]', msg);
      }

      // Try the same-origin iframe DOM path first. This is the most reliable
      // route for doc/deck players because it bypasses postMessage timing and
      // lands directly on the visible child document. If that fails, callers
      // can still fall back to postMessage or other transport logic.
      function tryDirectIframeTransport(command) {
        const envelope = normalizeTransportCommand(command);
        const action = envelope.action;
        const payload = envelope.payload || {};
        const len = playlist.length || 0;
        const iframe = document.querySelector('#playerContainer iframe, .wall-stage iframe, .zone iframe');
        if (!iframe) return false;

        try {
          const childWindow = iframe.contentWindow;
          if (childWindow && typeof childWindow.handleAction === 'function') {
            const ack = childWindow.handleAction(envelope) || {};
            const state = (ack && ack.state) || childWindow.__mcTransportState || null;
            finishTransportCommand(command, ack.ok !== false, ack.error || null, state || buildPlayerState());
            _showTransportDebug('child handleAction: ' + action);
            return true;
          }
        } catch (childErr) {
          finishTransportCommand(command, false, childErr && childErr.message ? childErr.message : String(childErr || 'child handleAction failed'), buildPlayerState());
          _showTransportError('child handleAction failed: ' + (childErr && childErr.message ? childErr.message : String(childErr || 'unknown')));
          return true;
        }

        let domHandled = false;
        try {
          const idoc = iframe.contentDocument;
          if (idoc) {
            const pageImg = idoc.getElementById('page');
            if (pageImg && pageImg.src) {
              const m = pageImg.src.match(/\/(\d+)\.png/);
              const curPage = m ? parseInt(m[1], 10) : 1;
              const statusEl = idoc.getElementById('status');
              let totalPages = 1;
              if (statusEl && statusEl.textContent) {
                const tm = statusEl.textContent.match(/(\d+)\s*\/\s*(\d+)/);
                if (tm) totalPages = parseInt(tm[2], 10);
              }
              let newPage = curPage;
              if (action === 'next') newPage = Math.min(totalPages, curPage + 1);
              else if (action === 'prev') newPage = Math.max(1, curPage - 1);
              else if (action === 'restart') newPage = 1;
              else if (action === 'go_to_slide' || action === 'slide' || action === 'goto') {
                const targetPage = payload.page !== undefined && payload.page !== null
                  ? payload.page
                  : payload.slide !== undefined && payload.slide !== null
                    ? payload.slide
                    : payload.index !== undefined && payload.index !== null
                      ? payload.index
                      : payload.page_number !== undefined && payload.page_number !== null
                        ? payload.page_number
                        : payload.slide_number !== undefined && payload.slide_number !== null
                          ? payload.slide_number
                          : null;
                const parsedTarget = parseInt(targetPage, 10);
                if (Number.isFinite(parsedTarget)) newPage = Math.max(1, parsedTarget);
              }
              else if (action === 'play_pause') {
                try { if (iframe.contentWindow.toggleAuto) iframe.contentWindow.toggleAuto(); } catch (_) {}
                domHandled = true;
              }
              if (!domHandled && newPage !== curPage) {
                const newSrc = pageImg.src.replace(/\/\d+\.png/, '/' + newPage + '.png');
                pageImg.src = newSrc;
                if (statusEl) {
                  const fn = statusEl.textContent.split('·')[0].trim();
                  statusEl.textContent = fn + ' · ' + newPage + ' / ' + totalPages;
                }
                domHandled = true;
                _showTransportDebug('slide ' + curPage + '→' + newPage + ' / ' + totalPages);
              }
            }
            if (!domHandled) {
              const slides = idoc.querySelectorAll('.slide');
              if (slides.length > 0) {
                let curIdx = 0;
                slides.forEach(function(s, i) { if (s.classList.contains('show')) curIdx = i; });
                let newIdx = curIdx;
                if (action === 'next') newIdx = Math.min(slides.length - 1, curIdx + 1);
                else if (action === 'prev') newIdx = Math.max(0, curIdx - 1);
                else if (action === 'restart') newIdx = 0;
                else if (action === 'go_to_slide' || action === 'slide' || action === 'goto') {
                  const targetSlide = payload.page !== undefined && payload.page !== null
                    ? payload.page
                    : payload.slide !== undefined && payload.slide !== null
                      ? payload.slide
                      : payload.index !== undefined && payload.index !== null
                        ? payload.index
                        : payload.page_number !== undefined && payload.page_number !== null
                          ? payload.page_number
                          : payload.slide_number !== undefined && payload.slide_number !== null
                            ? payload.slide_number
                            : null;
                  const parsedTarget = parseInt(targetSlide, 10);
                  if (Number.isFinite(parsedTarget)) {
                    newIdx = Math.max(0, Math.min(slides.length - 1, parsedTarget > 0 ? parsedTarget - 1 : parsedTarget));
                  }
                }
                if (newIdx !== curIdx) {
                  slides[curIdx].classList.remove('show');
                  slides[newIdx].classList.add('show');
                  domHandled = true;
                  _showTransportDebug('deck ' + curIdx + '→' + newIdx + ' / ' + slides.length);
                }
              }
            }
          }
        } catch (domErr) {
          _showTransportDebug('DOM access failed: ' + domErr.message + ' — trying postMessage');
        }

        if (domHandled) {
          finishTransportCommand(command, true, null, buildPlayerState());
          return true;
        }
        return false;
      }

      // Transport (Broadcast Center control bar): next/prev/play_pause/restart.
      // The child iframe is authoritative when it exists. We try handleAction
      // first, then postMessage, and only fall back to DOM manipulation if no
      // transportable child is available.
      function doTransport(input) {
        const command = normalizeTransportCommand(input);
        const action = command.action;
        if (!action) return;
        try {
          const item = playlist[currentIndex] || {};
          markTransportCommand(command, 'pending');
          publishPlayerState();

          // ── YouTube IFrame API fast path ───────────────────────────────────
          if (activeYtPlayer) {
            try {
              if (action === 'play_pause') {
                const state = typeof activeYtPlayer.getPlayerState === 'function'
                  ? activeYtPlayer.getPlayerState() : -1;
                if (state === 1) activeYtPlayer.pauseVideo();
                else activeYtPlayer.playVideo();
              } else if (action === 'next') {
                nextItem();
              } else if (action === 'prev') {
                if (playlist.length) { currentIndex = (currentIndex - 2 + playlist.length) % playlist.length; nextItem(); }
              } else if (action === 'restart') {
                if (typeof activeYtPlayer.seekTo === 'function') {
                  activeYtPlayer.seekTo(0, true);
                  activeYtPlayer.playVideo();
                } else {
                  currentIndex = -1; nextItem();
                }
              } else if (action === 'pause') {
                if (typeof activeYtPlayer.pauseVideo === 'function') activeYtPlayer.pauseVideo();
              } else if (action === 'play') {
                if (typeof activeYtPlayer.playVideo === 'function') activeYtPlayer.playVideo();
              }
            } catch (e) {
              finishTransportCommand(command, false, 'YT: ' + e.message, buildPlayerState());
              _showTransportError('YT: ' + e.message);
              return;
            }
            finishTransportCommand(command, true, null, buildPlayerState());
            return;
          }

          const frameTransportable = !!(item && (isDocumentMime(item.mime_type) || item.mime_type === 'text/html'));
          if (frameTransportable) {
            if (tryDirectIframeTransport(command)) {
              return;
            }
            const posted = postTransportToFrames(command);
            if (posted) {
              _showTransportDebug('frame transport: ' + action + (command.command_id ? ' #' + String(command.command_id).slice(0, 8) : ''));
              return;
            }
          }

          // ── No controllable iframe — drive the playlist/video directly ────
          const len = playlist.length || 0;
          const video = document.querySelector('#playerContainer video, .wall-stage video');
          let handled = false;
          if (action === 'next') { nextItem(); handled = true; _showTransportDebug('nextItem'); }
          else if (action === 'prev') { if (len) { currentIndex = (currentIndex - 2 + len) % len; nextItem(); } handled = true; _showTransportDebug('prevItem'); }
          else if (action === 'play_pause') {
            if (video) {
              if (video.paused) { unlockAudio(); video.play().catch(() => {}); }
              else { video.pause(); }
            }
            handled = true;
            _showTransportDebug('play_pause');
          }
          else if (action === 'restart') { currentIndex = -1; nextItem(); handled = true; _showTransportDebug('restart'); }
          else if (action === 'pause') {
            if (video && !video.paused) video.pause();
            handled = true;
            _showTransportDebug('pause');
          }
          else if (action === 'play') {
            if (video && video.paused) { unlockAudio(); video.play().catch(() => {}); }
            handled = true;
            _showTransportDebug('play');
          }

          if (handled) {
            finishTransportCommand(command, true, null, buildPlayerState());
            return;
          }

          finishTransportCommand(command, false, 'No controllable media found', buildPlayerState());
          _showTransportError('No controllable media found for ' + action);
        } catch (e) {
          finishTransportCommand(command, false, e.message, buildPlayerState());
          _showTransportError('doTransport: ' + e.message);
        }
      }

      // Phase 2: dashboard "Identify" action — flash a big high-contrast
      // marker on this display for ~5s. Does not disturb playback underneath.
      socket.on('device:identify', (data) => {
        console.log('Identify requested:', data?.label || config.deviceName || '', data?.mode || 'identify');
        if (data && data.mode === 'calibration') showCalibrationOverlay(data);
        else showIdentifyOverlay(data && data.label);
      });

      // Phase 6: Smartboard — the dashboard relays normalized 0..1 drawing
      // events here. We render them on a fullscreen overlay above playback.
      // Every handler is wrapped defensively: a bad payload must never crash
      // the player (playback continues underneath regardless).
      socket.on('device:wb-show', (data) => {
        try {
          console.log('Smartboard: show');
          if (data && data.display_profile) applyDisplayProfile(data.display_profile);
          wbShow(data || {});
        } catch (e) { /* never break playback */ }
      });

      socket.on('device:wb-stroke', (data) => {
        try {
          if (!_wb.overlay) wbShow(); // tolerate a stroke before show
          const stroke = data && data.stroke;
          if (!stroke || !Array.isArray(stroke.points) || stroke.points.length === 0) return;
          wbStoreStroke(stroke);
          wbDrawStroke(stroke);
        } catch (e) { /* never break playback */ }
      });

      socket.on('device:wb-clear', () => {
        try {
          console.log('Smartboard: clear');
          _wb.strokes = [];
          wbRedrawAll();
        } catch (e) { /* never break playback */ }
      });

      socket.on('device:wb-undo', () => {
        try {
          console.log('Smartboard: undo');
          if (_wb.strokes.length > 0) _wb.strokes.pop();
          wbRedrawAll();
        } catch (e) { /* never break playback */ }
      });

      socket.on('device:wb-redo', (data) => {
        try {
          console.log('Smartboard: redo');
          const stroke = data && data.stroke;
          if (!stroke) return;
          wbStoreStroke(stroke);
          wbRedrawAll();
        } catch (e) { /* never break playback */ }
      });

      socket.on('device:wb-stop', () => {
        try {
          console.log('Smartboard: stop');
          wbStop();
        } catch (e) { /* never break playback */ }
      });
    }

    function register() {
      const data = {};
      if (config.deviceId && config.paired) {
        data.device_id = config.deviceId;
        if (config.deviceToken) data.device_token = config.deviceToken;
      } else {
        const code = String(Math.floor(100000 + Math.random() * 900000));
        config.pairingCode = code;
        saveConfig(config);
        data.pairing_code = code;
      }
      data.device_info = {
        android_version: 'Web/' + navigator.userAgent.split(' ').pop(),
        app_version: '1.1.0-web',
        screen_width: screen.width,
        screen_height: screen.height,
      };
      // Browser fingerprint (survives localStorage clear)
      data.fingerprint = generateBrowserFingerprint();
      console.log(`[register] device_id=${data.device_id || 'none'}, has_token=${!!data.device_token}, token_len=${data.device_token?.length || 0}, paired=${config.paired}, pairing_code=${data.pairing_code || 'none'}`);
      socket.emit('device:register', data);
    }

    // ==================== Heartbeat ====================
    function startHeartbeat() {
      stopHeartbeat();
      heartbeatTimer = setInterval(() => {
        if (!socket?.connected || !config.deviceId) return;
        const state = buildPlayerState();
        socket.emit('device:heartbeat', {
          device_id: config.deviceId,
          telemetry: state.telemetry,
        });
        publishPlayerState();
      }, HEARTBEAT_INTERVAL);
    }

    function stopHeartbeat() { if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; } }

    function startPlaylistRefresh() {
      // WebSocket pushes remain the instant path. This lightweight revision
      // check repairs a missed push within seconds instead of leaving a wall on
      // stale content until the old five-minute re-register fallback fires.
      if (refreshTimer) clearInterval(refreshTimer);
      const reconcile = () => {
        if (!socket?.connected || !config.deviceId || !config.paired) return;
        socket.emit('device:playlist-sync', {
          playlist_revision: appliedPlaylistRevision,
        });
      };
      setTimeout(reconcile, 750);
      refreshTimer = setInterval(() => {
        reconcile();
      }, 3000);
    }

    // ==================== Auto-reload on code update ====================
    let knownServerHash = null;
    let versionCheckTimer = null;
    function startVersionCheck() {
      if (versionCheckTimer) clearInterval(versionCheckTimer);
      // Initial fetch to learn current hash
      fetch(config.serverUrl + '/api/version').then(r => r.json()).then(data => {
        knownServerHash = data.hash;
        console.log('Server version:', data.version, 'hash:', data.hash);
      }).catch(() => {});
      // Poll every 30s
      versionCheckTimer = setInterval(() => {
        fetch(config.serverUrl + '/api/version').then(r => r.json()).then(data => {
          if (knownServerHash && data.hash !== knownServerHash) {
            console.log('Server code updated, reloading...', knownServerHash, '->', data.hash);
            location.reload();
          }
        }).catch(() => {});
      }, 30000);
    }

    // ==================== Video Wall ====================
    // Convert a wall_config payload into CSS that sizes & positions the wall
    // stage so this device's tile is the visible portion. Each tile is
    // 100vw × 100vh; the stage is the full grid, translated by this tile's
    // grid position (plus bezel offsets in px between tiles).
    function applyWallMode(config) {
      const container = document.getElementById('playerContainer');
      // Tear down previous wall mode (clear sync timer regardless of new state)
      if (wallSyncTimer) { clearInterval(wallSyncTimer); wallSyncTimer = null; }
      lastWallSync = null;

      if (!config) {
        wallConfig = null;
        container.classList.remove('wall-mode');
        console.log('[wall] exited wall mode');
        return;
      }
      wallConfig = config;
      container.classList.add('wall-mode');
      console.log('[wall] applyWallMode wall=' + config.wall_id + ' is_leader=' + config.is_leader + ' userHasInteracted=' + userHasInteracted);

      // Enforce the audio rule on the currently-mounted video right now.
      // If the role flipped (e.g., leader was reassigned mid-stream), the
      // existing video element keeps its old muted state until we touch it.
      if (currentVideoEl) {
        if (config.is_leader) {
          // Defer to autoplay policy — leader can be unmuted once the user
          // has gestured. Don't yank audio if it's already playing.
        } else {
          if (!currentVideoEl.muted) currentVideoEl.muted = true;
        }
      }

      if (config.is_leader) {
        // Leader emits at 4Hz so followers can apply small playbackRate
        // corrections instead of jerk-seeking. Higher rates would saturate
        // the relay; 4Hz balances tightness against server load.
        wallSyncTimer = setInterval(emitWallSync, 250);
        // Immediate broadcast so any follower that's already up aligns now,
        // without waiting up to 250ms for the first scheduled tick. This
        // also covers a leader reclaiming the role after a reconnect.
        setTimeout(emitWallSync, 100);
      } else {
        // Follower: ask the leader for its current position. Without this,
        // the screen shows the start of the current item until the leader's
        // next periodic tick (up to ~1s of visible drift on a fresh join).
        if (socket?.connected) {
          console.log('[wall] follower emitting sync-request for wall ' + config.wall_id);
          socket.emit('wall:sync-request', { wall_id: config.wall_id });
        }
      }
    }

    function emitWallSync() {
      if (!wallConfig?.is_leader || !socket?.connected || playlist.length === 0) return;
      const item = playlist[currentIndex];
      if (!item) return;
      // Prefer the actual playing element's position. YouTube is in an iframe,
      // so we read its clock via the JS API; HTML5 <video> reports directly;
      // image / widget items use wall-clock since item start (no embedded clock).
      let position = 0;
      if (activeYtPlayer && typeof activeYtPlayer.getCurrentTime === 'function') {
        try { position = activeYtPlayer.getCurrentTime() || 0; } catch (_) {}
      } else if (currentVideoEl) {
        position = currentVideoEl.currentTime || 0;
      } else {
        position = Math.max(0, (Date.now() - currentItemStartedAt) / 1000);
      }
      socket.emit('wall:sync', {
        wall_id: wallConfig.wall_id,
        device_id: config.deviceId,
        current_index: currentIndex,
        content_id: item.content_id || null,
        position_sec: position,
        sent_at: Date.now(),
        start_in_ms: Math.max(0, currentItemStartedAt - Date.now()),
      });
    }

    // Map the player rect into this device's viewport using vw/vh so the
    // viewport fills edge-to-edge (no pillarbox at the seam between adjacent
    // screens). With object-fit:cover on the single stage element, the
    // source crops to the whole-composite box (player_rect) — every screen
    // shows its slice edge-to-bezel, and because it's one element clipped
    // per-screen, vertical position stays identical across devices that
    // share a viewport height (1vh maps to the same physical pixel on each).
    function styleWallStage(stageEl) {
      if (!wallConfig?.screen_rect || !wallConfig?.player_rect) return;
      const s = wallConfig.screen_rect;
      const p = wallConfig.player_rect;
      if (!s.w || !s.h) return;
      const left   = ((p.x - s.x) / s.w) * 100;
      const top    = ((p.y - s.y) / s.h) * 100;
      const width  = (p.w / s.w) * 100;
      const height = (p.h / s.h) * 100;
      const dev = (config.deviceId || '?').slice(0, 8);
      console.log('[wall/render ' + dev + '] screen_rect: ' + JSON.stringify(s) + ' player_rect: ' + JSON.stringify(p));
      console.log('[wall/render ' + dev + '] viewport: ' + window.innerWidth + 'x' + window.innerHeight + ' DPR=' + window.devicePixelRatio);
      console.log('[wall/render ' + dev + '] stage: left=' + left.toFixed(4) + 'vw top=' + top.toFixed(4) + 'vh width=' + width.toFixed(4) + 'vw height=' + height.toFixed(4) + 'vh');
      stageEl.style.left = left + 'vw';
      stageEl.style.top = top + 'vh';
      stageEl.style.width = width + 'vw';
      stageEl.style.height = height + 'vh';
      stageEl.style.transform = '';
    }

    // No-op kept for callers that bind a resize listener (kept around in case
    // future zoom/orientation tweaks need it). vw/vh stage updates with the
    // viewport automatically, so explicit re-style isn't needed today.
    function bindWallResizeOnce() {}

    // ==================== Playlist ====================
    function handlePlaylistUpdate(data) {
      // Check if device is suspended (trial expired / over limit)
      if (data.suspended) {
        isPlaying = false;
        playlist = [];
        document.getElementById('playerContainer').style.display = 'none';
        const overlay = document.getElementById('statusOverlay');
        overlay.style.display = 'flex';
        overlay.innerHTML = `
          <div style="text-align:center;max-width:500px">
            <div style="font-size:64px;margin-bottom:16px">&#9888;</div>
            <h2 style="color:#f59e0b;margin-bottom:8px">${data.message || 'Account Suspended'}</h2>
            <p style="color:#94a3b8;font-size:16px;margin-bottom:24px">${data.detail || 'Please upgrade your plan.'}</p>
            <p style="color:#64748b;font-size:13px">Visit your dashboard to manage your subscription</p>
          </div>
        `;
        return;
      }

      const newItems = data.assignments || [];
      appliedPlaylistRevision = typeof data.playlist_revision === 'string'
        ? data.playlist_revision
        : null;
      const serverRestoreState = data.display_state || null;
      applyDisplayProfile(data.display_profile || null);
      // Build fingerprint from the fields that affect rendering. asset_url is
      // included so a server-side routing fix forces stale cached players to
      // accept the new playable URL instead of keeping a black media element.
      const fingerprint = (items) => items.map(a => `${a.content_id || ''}|${a.widget_id || ''}|${a.asset_url || ''}|${a.remote_url || ''}|${a.filepath || ''}|${a.filename || ''}|${a.mime_type || ''}|${a.fit_mode || ''}`).join(',');
      const newFp = fingerprint(newItems);
      const oldFp = fingerprint(playlist);

      // Apply orientation
      if (data.orientation) {
        const rotations = { 'landscape': '0deg', 'portrait': '90deg', 'landscape-flipped': '180deg', 'portrait-flipped': '270deg' };
        document.getElementById('playerContainer').style.transform = `rotate(${rotations[data.orientation] || '0deg'})`;
        if (data.orientation.includes('portrait')) {
          document.getElementById('playerContainer').style.transformOrigin = 'center center';
          document.getElementById('playerContainer').style.width = '100vh';
          document.getElementById('playerContainer').style.height = '100vw';
        }
      }

      // Apply (or clear) wall mode. Force re-render when wall config changes
      // even if the playlist itself didn't, so leader/follower role transitions
      // and tile reassignments take effect immediately.
      function wallKey(c) {
        if (!c) return '';
        const s = c.screen_rect || {}, p = c.player_rect || {};
        return `${c.wall_id}:${c.is_leader}:s${s.x},${s.y},${s.w},${s.h}:p${p.x},${p.y},${p.w},${p.h}`;
      }
      const wallChanged = wallKey(wallConfig) !== wallKey(data.wall_config);
      if (wallChanged) applyWallMode(data.wall_config || null);
      // A fresh playlist-update on a follower (typical after socket reconnect)
      // is a good signal to ask the leader for its current position even when
      // the wall config itself didn't change. Cheap, debounced server-side.
      if (!wallChanged && wallConfig && !wallConfig.is_leader && socket?.connected) {
        socket.emit('wall:sync-request', { wall_id: wallConfig.wall_id });
      }

      layout = data.layout || null;
      const hasDisplayRestore = primeDisplayStateRestore(serverRestoreState, 'playlist-update');

      if (newFp === oldFp && playlist.length > 0 && !wallChanged) {
        console.log('Playlist unchanged');
        if (hasDisplayRestore) scheduleDisplayStateRestore('playlist-unchanged');
        return;
      }

      console.log('Playlist changed, updating');
      // Capture old state BEFORE mutating so continuity logic can find what was playing.
      const identityOf = (x) => x ? `${x.content_id || ''}|${x.widget_id || ''}|${x.remote_url || ''}|${x.filepath || ''}` : '';
      const renderKeyOf = (x) => x ? `${identityOf(x)}|${x.asset_url || ''}|${x.mime_type || ''}|${x.fit_mode || ''}` : '';
      const oldPlaylist = playlist;
      const oldAnchorIdx = currentIndex;
      const oldAnchorId = identityOf(oldPlaylist[oldAnchorIdx]);
      const oldAnchorRenderKey = renderKeyOf(oldPlaylist[oldAnchorIdx]);

      playlist = newItems;
      savePlaylistCache(playlist);
      lastTransportState = null;

      if (playlist.length === 0) {
        clearDisplayStateRestore();
        teardownCurrentMedia();
        showStatus('Waiting for content...');
        isPlaying = false;
        publishPlayerState();
        return;
      }

      document.getElementById('setupScreen').style.display = 'none';

      // Continuity: if the playing item survives the update and its render
      // inputs did not change, keep playing it. Wall changes or media URL
      // changes must re-render immediately; otherwise cached solo playback can
      // stay mounted after a device enters wall mode, or keep a broken URL.
      if (oldAnchorId && oldAnchorId !== '|||') {
        const stillThereIdx = playlist.findIndex(x => identityOf(x) === oldAnchorId);
        if (stillThereIdx !== -1) {
          currentIndex = stillThereIdx;
          if (!wallChanged && oldAnchorRenderKey === renderKeyOf(playlist[stillThereIdx])) {
            isPlaying = true;
            if (hasDisplayRestore) scheduleDisplayStateRestore('playlist-continuity');
            return;
          }
          isPlaying = true;
          playCurrentItem();
          return;
        }
      }

      // Anchor is gone. Walk forward from the OLD position through the old playlist,
      // pick the first item that still exists in the new one. Preserves "what was
      // scheduled to play next, that still exists". Wraps past the end naturally.
      let nextIdx = -1;
      if (oldPlaylist.length > 0 && Number.isFinite(oldAnchorIdx)) {
        for (let i = 1; i <= oldPlaylist.length; i++) {
          const probe = oldPlaylist[(oldAnchorIdx + i) % oldPlaylist.length];
          const probeId = identityOf(probe);
          if (!probeId || probeId === '|||') continue;
          const found = playlist.findIndex(x => identityOf(x) === probeId);
          if (found !== -1) { nextIdx = found; break; }
        }
      }
      if (nextIdx === -1) nextIdx = 0;

      currentIndex = nextIdx;
      isPlaying = true;
      playCurrentItem();
    }

    function playCurrentItem() {
      if (!playlist.length || !Number.isFinite(currentIndex)) {
        teardownCurrentMedia();
        showStatus('Waiting for content...');
        isPlaying = false;
        return;
      }
      if (currentIndex < 0 || currentIndex >= playlist.length) currentIndex = 0;

      hideStatus();
      const item = playlist[currentIndex];
      lastTransportState = null;
      console.log('Playing:', item.filename, `(${currentIndex + 1}/${playlist.length})`);
      currentItemStartedAt = pendingWallStartAt || (wallConfig?.is_leader ? Date.now() + 500 : Date.now());
      pendingWallStartAt = 0;

      // Only the leader (or single, non-walled players) records a play_start —
      // followers would just spam duplicate proof-of-play rows for the same item.
      if (socket?.connected && (!wallConfig || wallConfig.is_leader)) {
        socket.emit('device:play-event', {
          device_id: config.deviceId,
          event: 'play_start',
          content_id: item.content_id,
          content_name: item.filename,
          duration_sec: item.duration_sec || null,
        });
      }

      renderContent(item);
      if (pendingDisplayStateRestore && isRestorableSlideItem(item) && currentItemMatchesRestore(item, pendingDisplayStateRestore)) {
        scheduleDisplayStateRestore('play-current-item');
      }

      // Push an immediate sync so followers don't have to wait up to 1s for
      // the next periodic tick before snapping to the new item.
      if (wallConfig?.is_leader) emitWallSync();
      publishPlayerState();
    }

    function nextItem() {
      // Send play_end for current
      if (playlist[currentIndex] && socket?.connected) {
        socket.emit('device:play-event', {
          device_id: config.deviceId,
          event: 'play_end',
          content_id: playlist[currentIndex].content_id,
          content_name: playlist[currentIndex].filename,
          completed: true,
        });
      }

      currentIndex = (currentIndex + 1) % playlist.length;
      playCurrentItem();
    }

    // ==================== Content Rendering ====================
    function contentSrcForItem(item) {
      if (!item) return '';
      if (item.asset_url) return item.asset_url;
      if (item.remote_url) return item.remote_url;
      if (item.content_id) return `${config.serverUrl}/api/content/${encodeURIComponent(item.content_id)}/file`;
      if (item.filepath) return `${config.serverUrl}/uploads/content/${item.filepath}`;
      return '';
    }

    // Origin (server) URL for an item, IGNORING any local/LAN asset_url. This is
    // the SAFETY fallback for local content delivery: if a classroom display is
    // pointed at a local cache (asset_url -> P3 room-agent) and that fetch fails
    // (agent down, asset not cached, network blip), the <img>/<video> onerror
    // handlers swap to this server route so a wall can NEVER go blank because of
    // the local cache. Returns '' when there is no server-served file (e.g. a
    // pure remote_url item), in which case callers keep the original src.
    function originSrcForItem(item) {
      if (!item) return '';
      if (item.content_id) return `${config.serverUrl}/api/content/${encodeURIComponent(item.content_id)}/file`;
      if (item.filepath) return `${config.serverUrl}/uploads/content/${item.filepath}`;
      return '';
    }
    // Wire a one-shot origin fallback onto a media element. Only swaps when the
    // current src is a local/LAN asset_url that differs from the origin URL, and
    // only once (this.onerror=null) so a genuinely-broken asset still advances.
    function attachOriginFallback(el, item, onFinalError) {
      const origin = originSrcForItem(item);
      let swapped = false;
      el.addEventListener('error', function handler() {
        const usedLocal = item && (item.asset_proxy === 'local' || (item.asset_url && el.src === item.asset_url));
        if (!swapped && origin && usedLocal && el.src !== origin) {
          console.warn('[local-cache] asset_url failed, falling back to origin:', origin);
          swapped = true;
          currentLocalAssetReady = false;
          currentCacheStatus = 'origin-fallback';
          publishPlayerState();
          el.src = origin; // keep the listener; if origin also fails we reach onFinalError
          return;
        }
        if (typeof onFinalError === 'function') onFinalError();
      });
    }

    // Extract YouTube video ID from embed URL
    function extractVideoId(url) {
      try {
        const m = url.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
        if (m) return m[1];
        const u = new URL(url);
        return u.searchParams.get('v') || url.match(/([a-zA-Z0-9_-]{11})/)?.[1] || null;
      } catch { return null; }
    }

    // Load YouTube IFrame API once. (ytApiReady / ytApiCallbacks are declared at the
    // top of the script alongside the other player state.)
    function loadYoutubeApi(cb) {
      if (ytApiReady) { cb(); return; }
      ytApiCallbacks.push(cb);
      if (!document.getElementById('yt-api-script')) {
        const tag = document.createElement('script');
        tag.id = 'yt-api-script';
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);
        window.onYouTubeIframeAPIReady = () => {
          ytApiReady = true;
          ytApiCallbacks.forEach(fn => fn());
          ytApiCallbacks = [];
        };
      }
    }

    function createYoutubeEmbed(src, item, container) {
      const videoId = extractVideoId(src);
      if (!videoId) {
        console.error('Could not extract YouTube video ID from:', src);
        if (playlist.length > 1) setTimeout(nextItem, 2000);
        return null;
      }

      // Invalidate any previous player's callbacks
      const myGeneration = ++ytGeneration;

      // Destroy old player without triggering side effects (callbacks check generation)
      if (activeYtPlayer) { try { activeYtPlayer.destroy(); } catch {} activeYtPlayer = null; }

      // Wall-follower flag drives mute/overlay/autoplay decisions below. Followers
      // never have their own audio (leader-only audio rule prevents echo across
      // adjacent TVs), so the "Click to unmute" overlay would be misleading on a
      // follower and could itself create echo if someone tapped it.
      const isFollowerEmbed = !!(wallConfig && !wallConfig.is_leader);

      // Create a div for the YT player to replace
      const playerDiv = document.createElement('div');
      playerDiv.id = 'yt-player-' + Date.now();
      playerDiv.style.cssText = 'width:100%;height:100%;background:#000';
      container.appendChild(playerDiv);

      // Add a click-to-unmute overlay on top of the YouTube iframe — leader/solo only.
      if (!userHasInteracted && !isFollowerEmbed) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:absolute;inset:0;z-index:10;cursor:pointer;display:flex;align-items:end;justify-content:center;padding-bottom:max(40px,4vh);';
        overlay.innerHTML = '<div style="background:rgba(0,0,0,0.7);color:#fff;padding:max(8px,1vw) max(20px,2vw);border-radius:max(6px,0.5vmin);font:clamp(12px,1.5vw,16px) sans-serif;pointer-events:none">Click to unmute</div>';
        overlay.onclick = (e) => {
          e.stopPropagation();
          userHasInteracted = true;
          unlockAudio();
          if (activeYtPlayer && typeof activeYtPlayer.unMute === 'function') {
            activeYtPlayer.unMute();
            activeYtPlayer.setVolume(100);
            console.log('Unmuted YouTube player via overlay');
          }
          overlay.remove();
        };
        // Don't override container.style.position here — #playerContainer is already
        // position:fixed so absolute children anchor to it. Setting position:relative
        // collapsed the container to 0 height (no content sizing it in normal flow),
        // which made the YT iframe render black.
        container.appendChild(overlay);
      }

      loadYoutubeApi(() => {
        // Bail if a newer player was created while we waited for the API
        if (myGeneration !== ytGeneration) return;

        const shouldLoop = playlist.length <= 1;
        let playStartTime = 0;
        activeYtPlayer = new YT.Player(playerDiv.id, {
          videoId: videoId,
          width: '100%',
          height: '100%',
          playerVars: {
            autoplay: 1,
            // Wall followers MUST stay muted regardless of userHasInteracted
            // (leader-only audio rule prevents echo). Solo / leader follow the
            // standard autoplay-policy logic: muted until the user interacts.
            mute: isFollowerEmbed ? 1 : (userHasInteracted ? 0 : 1),
            controls: 0,
            rel: 0,
            modestbranding: 1,
            loop: shouldLoop ? 1 : 0,
            playlist: shouldLoop ? videoId : undefined,
            enablejsapi: 1,
            playsinline: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: (event) => {
              if (myGeneration !== ytGeneration) return;
              const role = isFollowerEmbed ? 'follower' : (wallConfig?.is_leader ? 'leader' : 'solo');
              console.log('YouTube player ready:', item.filename, 'role=' + role);
              event.target.playVideo();
