              if (userHasInteracted && !isFollowerEmbed) {
                event.target.unMute();
                event.target.setVolume(100);
              }
              // Silk Browser on Fire TV (and some other lockdown Chromium variants)
              // sometimes leaves the player in UNSTARTED (-1) / CUED (5) state
              // even with autoplay=1 + mute=1. Poll up to 5 times in 5 seconds
              // to kick playVideo() until the state machine actually transitions.
              let kickRetries = 0;
              const kick = () => {
                if (myGeneration !== ytGeneration) return;
                if (!activeYtPlayer || typeof activeYtPlayer.getPlayerState !== 'function') return;
                const s = activeYtPlayer.getPlayerState();
                if (s === -1 || s === 5) {
                  try { activeYtPlayer.playVideo(); } catch (_) {}
                  kickRetries++;
                  if (kickRetries < 5) setTimeout(kick, 1000);
                }
              };
              setTimeout(kick, 1000);
            },
            onError: (event) => {
              if (myGeneration !== ytGeneration) return;
              console.error('YouTube error', event.data, 'for:', item.filename);
              if (playlist.length > 1) {
                console.log('Skipping unplayable YouTube video');
                setTimeout(nextItem, 2000);
              }
            },
            onStateChange: (event) => {
              if (myGeneration !== ytGeneration) return;
              // Track when video actually starts playing
              if (event.data === 1) playStartTime = Date.now();
              // Followers paused unexpectedly (e.g. OS audio-focus loss on
              // Fire TV) should resume — the leader is the source of truth
              // and a wall:sync may not arrive fast enough to recover the
              // playback state on its own.
              if (event.data === 2 && isFollowerEmbed) {
                setTimeout(() => {
                  if (myGeneration === ytGeneration && activeYtPlayer &&
                      typeof activeYtPlayer.getPlayerState === 'function' &&
                      activeYtPlayer.getPlayerState() === 2) {
                    try { activeYtPlayer.playVideo(); } catch (_) {}
                  }
                }, 500);
              }
              // YT.PlayerState.ENDED = 0 — only the leader / solo advances.
              // Followers wait for wall:sync to bump current_index; if they
              // self-advanced on ENDED the wall would desync.
              if (event.data === 0 && !shouldLoop && (Date.now() - playStartTime) > 3000) {
                console.log('YouTube video ended:', item.filename, 'role=' + (isFollowerEmbed ? 'follower' : 'leader/solo'));
                if (!isFollowerEmbed) nextItem();
              }
            },
          },
        });
      });

      // Note: YouTube advancement is handled by onStateChange ENDED event.
      // Do NOT use duration_sec timeout here — it defaults to 10s for assignments
      // and would cut videos short. The YouTube player tells us when it's done.

      return playerDiv;
    }

    // Stop and release all media in the player. pause() alone leaves the decoder
    // buffering on some browsers; removeAttribute('src') + load() is what actually
    // releases the decoder and kills audio. Null event handlers so a late onended
    // can't fire into a stale playlist state. Queries all <video> elements so
    // zone-mode (multi-region) videos get cleaned up too, not just currentVideoEl.
    function teardownCurrentMedia() {
      if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
      const container = document.getElementById('playerContainer');
      if (container) {
        container.querySelectorAll('video').forEach(v => {
          try {
            v.onended = null; v.onerror = null; v.onloadeddata = null;
            v.pause();
            v.removeAttribute('src');
            v.load();
          } catch (e) { /* element may already be detached */ }
        });
        container.innerHTML = '';
      }
      currentVideoEl = null;
      lastTransportState = null;
    }

    // The source image is a composite classroom map, not a conventional photo.
    // Its library default remains aspect-preserving on a solo TV, but a wall must
    // stretch the composite once and then clip the correct slice per display.
    const WALL_FILL_CONTENT_IDS = new Set(['7c596f36-27f6-4d7b-9bb0-2c682791d25a']);
    function contentFitMode(item, isWall) {
      const requested = String((item && item.fit_mode) || '').trim();
      if (item && isWall && WALL_FILL_CONTENT_IDS.has(item.content_id)) return 'fill';
      if (item && WALL_FILL_CONTENT_IDS.has(item.content_id)) return 'contain';
      return requested || (isWall ? 'fill' : 'contain');
    }

    function renderContent(item) {
      teardownCurrentMedia();

      const localPlayableAsset = usesClassroomLocalAsset(item);
      currentLocalAssetReady = localPlayableAsset ? false : null;
      currentCacheStatus = localPlayableAsset ? 'staging' : 'direct';

      const container = document.getElementById('playerContainer');
      container.style.display = 'block';

      // Defense in depth: bail to waiting state on missing/malformed item rather
      // than fall through every branch and leave a blank container.
      // 2026-05-28: also accept PDF + Office MIMEs so they don't fall into the
      // "Waiting for content" hole.
      // URL routing lives in the shared, unit-tested player-routing.js module
      // (window.PlayerRouting). ownPlayerPath() rewrites our OWN absolute player/
      // content URLs to root-relative so they load LIVE from this device's own
      // origin (never the foreign-site screenshot), regardless of which hostname
      // the content row was saved with. isExternalSite() is now only true for a
      // genuinely third-party site. See the module header for the full rationale.
      var PR = window.PlayerRouting || {
        ownPlayerPath: function () { return null; },
        isExternalSite: function (u) { return !!u && /^https?:\/\//i.test(u) && (function () { try { return new URL(u).host !== location.host; } catch (e) { return false; } })(); },
        isGridUrl: function (u) { return typeof u === 'string' && /\/player\/grid\.html(\?|$)/.test(u); },
        isFramableSite: function () { return false; }
      };
      function isExternalSite(u) { return PR.isExternalSite(u, location.host); }
      function isGridUrl(u) { return PR.isGridUrl(u); }
      function gridTargetAspect(mountEl) {
        var w, h;
        if (wallConfig && wallConfig.player_rect && wallConfig.player_rect.w && wallConfig.player_rect.h) { w = wallConfig.player_rect.w; h = wallConfig.player_rect.h; }
        else { w = (mountEl && mountEl.clientWidth) || window.innerWidth || 16; h = (mountEl && mountEl.clientHeight) || window.innerHeight || 9; }
        return h > 0 ? (w / h) : (16 / 9);
      }
      const hasRenderableType = item && (
        item.widget_id ||
        item.mime_type === 'video/youtube' ||
        item.mime_type === 'application/pdf' ||
        item.mime_type === 'text/html' ||
        (item.remote_url && /\/player\/deck\//.test(item.remote_url)) ||
        isOfficeMime(item.mime_type) ||
        (typeof item.mime_type === 'string' && (item.mime_type.startsWith('video/') || item.mime_type.startsWith('image/')))
      );
      if (!hasRenderableType) {
        showStatus('Waiting for content...');
        isPlaying = false;
        publishPlayerState();
        return;
      }

      // In wall mode, mount content into a stage that maps the player_rect
      // into this device's viewport. playerContainer's overflow:hidden clips
      // the parts of the stage outside this device's viewport, so each
      // device shows exactly its slice of the wall.
      let mount = container;
      if (wallConfig) {
        const stage = document.createElement('div');
        stage.className = 'wall-stage';
        styleWallStage(stage);
        container.appendChild(stage);
        mount = stage;
      }

      // Followers don't run their own advance timers — the leader's wall:sync
      // dictates index transitions. Single-screen and leader behave normally.
      const isFollower = !!wallConfig && !wallConfig.is_leader;

      const remoteUrl = item.remote_url;
      // ── Runtime MIME self-heal ──────────────────────────────────────────────
      // Older content rows were stored with mime_type='text/html' or 'image/jpeg'
      // for YouTube URLs before the resolver was fixed. Detect this here and force
      // the correct type so these items NEVER reach the site.html/Chromium path:
      //   • Chromium renders YouTube headless → Google shows "sign in to confirm
      //     you're not a bot" → screenshot of that page → stuck on every display.
      //   • The YouTube IFrame API (createYoutubeEmbed) is the correct renderer.
      const _ytPattern = /(?:youtube\.com\/(?:watch|embed|v|shorts)|youtu\.be\/)/i;
      let _item = item;
      if (_item.mime_type !== 'video/youtube' && remoteUrl && _ytPattern.test(remoteUrl)) {
        _item = Object.assign({}, item, { mime_type: 'video/youtube' });
      }
      const effectiveMime = _item.mime_type;

      // A deck/presentation player page (or any text/html remote_url) is an
      // embedded WEB PAGE rendered in an iframe — never an <img>/<video>. The
      // deck-URL test also rescues legacy content rows still mis-typed image/jpeg
      // (the "presentation won't play on the wall" bug).
      const isWebpage = effectiveMime === 'text/html' ||
        (!!remoteUrl && /\/player\/deck\//.test(remoteUrl));
      const isYoutube = !isWebpage && effectiveMime === 'video/youtube';
      const isVideo = !isYoutube && !isWebpage && effectiveMime?.startsWith('video/');
      const isImage = !isWebpage && effectiveMime?.startsWith('image/');
      const isPdf = !isWebpage && effectiveMime === 'application/pdf';
      const isOffice = !isWebpage && isOfficeMime(effectiveMime);
      const serverUrl = config.serverUrl;
      const src = contentSrcForItem(item);
      // 2026-05-28: per-item fit_mode override. Null/undefined falls back to
      // 'fill' (wall) / 'contain' (solo). Validated server-side so any value
      // arriving here is a known CSS object-fit token.
      // Wall content stretches to fill exactly (object-fit:fill) edge-to-bezel
      // with no letterbox and no crop — the operator-confirmed wallpaper
      // behavior. Solo (non-wall) keeps 'contain' to preserve aspect (no
      // awkward distortion on a single display). Per-item fit_mode overrides
      // these. For doc/PDF/Office this also flows into docPlayerSrc → ?fit=
      // so doc.html renders pages with the matching object-fit.
      const cssFit = contentFitMode(item, !!wallConfig);

      if (layout && layout.zones && layout.zones.length > 1 && !wallConfig) {
        renderZones(container, item);
      } else {
        // Fullscreen / wall-tile
        if (isYoutube) {
          createYoutubeEmbed(src, item, mount);
        } else if (isWebpage) {
          // Deck / presentation / web page → embed in an iframe (the only way an
          // HTML page renders; an <img>/<video> against a page is blank). The wall
          // transport bar advances deck slides via postMessage (doTransport targets
          // .wall-stage iframe). A lone deck does NOT auto-advance (that would reload
          // the iframe and snap back to slide 1); a multi-item playlist advances by
          // duration like the other branches.
          const frame = document.createElement('iframe');
          // External third-party site → render via the server-side screenshot
          // player, which bypasses X-Frame-Options / CSP frame-ancestors (a
          // direct iframe of such a site renders blank). Our own /player/* pages
          // (decks, grid, oz, hls) are root-relative and iframe directly.
          let webSrc = src;
          const ownPath = PR.ownPlayerPath(remoteUrl);
          if (ownPath) {
            // Our OWN player/content page (grid / hls / oz / cam / deck / uploaded
            // file). Load it ROOT-RELATIVE from this device's own origin so it
            // iframes LIVE — even if the content row stored an absolute URL on a
            // sibling hostname. This is what rescued the video wall from the
            // foreign-site screenshot path (frozen, silent, 16:9-clamped stills).
            webSrc = ownPath;
            if (isGridUrl(ownPath)) {
              // Multiview grid → append the wall's target aspect so its cells tile
              // the full wall instead of falling back to the tiny 4+2+4 mosaic.
              const asp = gridTargetAspect(mount);
              webSrc = ownPath + (ownPath.indexOf('?') === -1 ? '?' : '&') + 'aspect=' + asp.toFixed(4);
            } else if (!isFollower && /\/player\/(oz|hls)\.html(\?|$)/.test(ownPath)) {
              // A single full-screen live stream (news / Ozolio cam) → play WITH
              // sound on leader/solo (followers stay muted to avoid echo across the
              // wall). The player falls back to muted if the browser blocks unmuted
              // autoplay, then unmutes on the one-time "tap to enable audio" gesture.
              webSrc = ownPath + (ownPath.indexOf('?') === -1 ? '?' : '&') + 'audio=1';
            }
          } else if (PR.isFramableSite(remoteUrl)) {
            // Our OWN dashboard on *.mbfdhub.com (e.g. the live ops wall). It sends
            // no X-Frame-Options, so iframe it LIVE at the display's full size —
            // NOT the server-side screenshot (which clamps width to 3840px and
            // centered it on the 12372px wall, showing only the middle screen).
            webSrc = remoteUrl;
          } else if (item.content_id && isExternalSite(remoteUrl)) {
            // A genuinely third-party site → server-side screenshot (bypasses
            // X-Frame-Options / CSP frame-ancestors that blank a direct iframe).
            const sw = Math.max(320, Math.min(3840, Math.round(mount.clientWidth || window.innerWidth || 1600)));
            const sh = Math.max(240, Math.min(2160, Math.round(mount.clientHeight || window.innerHeight || 900)));
            webSrc = '/player/site.html?id=' + encodeURIComponent(item.content_id) + '&w=' + sw + '&h=' + sh + '&full=1';
          }
          frame.src = webSrc;
          frame.style.cssText = 'width:100%;height:100%;border:none;background:#000';
          frame.allow = 'autoplay; fullscreen';
          // Multiview audio: once the page has user activation (the one-time "tap to
          // enable audio"), (re)enable the grid's chosen audio cell on EVERY mount —
          // so SWITCHING the audio frame by re-sending the layout takes effect live
          // without another tap (the grid is muted by default and unlockAudio only
          // fires on a fresh gesture). Followers stay muted (leader-only audio). The
          // grid is same-origin (root-relative) so we can call into it; it arms +
          // retries internally if its audio cell hasn't booted yet.
          if (isGridUrl(ownPath) && !isFollower) {
            frame.addEventListener('load', () => {
              if (!userHasInteracted) return;
              try { if (frame.contentWindow && frame.contentWindow.__mcEnableAudio) frame.contentWindow.__mcEnableAudio(); } catch (e) { /* not ready / cross-origin */ }
            });
          }
          mount.appendChild(frame);
          if (!isFollower && playlist.length > 1) {
            advanceTimer = setTimeout(nextItem, (item.duration_sec || 30) * 1000);
          }
        } else if (isVideo) {
          const video = document.createElement('video');
          video.src = src;
          const wallStartDelayMs = wallConfig && currentItemStartedAt > Date.now() + 40
            ? Math.min(2000, currentItemStartedAt - Date.now())
            : 0;
          video.autoplay = wallStartDelayMs <= 0;
          // Followers stay muted unconditionally (leader-only audio); leaders
          // start muted only if the user hasn't gestured yet (autoplay policy).
          video.muted = isFollower ? true : !userHasInteracted;
          // Explicit max volume on the leader so audio is at full level when
          // unmute happens (default is 1.0 but make it visible in logs).
          if (!isFollower) video.volume = 1.0;
          video.playsInline = true;
          video.crossOrigin = 'anonymous';
          // object-fit is driven by cssFit, which defaults to 'fill' on a wall
          // (edge-to-edge wallpaper stretch) and 'contain' solo (no crop).
          // On a wall the stage is a SINGLE element sized to the whole-composite
          // box and clipped per-screen, so 'fill' stretches uniformly across the
          // composite — vertical mapping stays uniform across devices that share
          // a viewport height (no per-screen desync).
          video.style.cssText = `width:100%;height:100%;object-fit:${cssFit};background:#000`;
          video.loop = (playlist.length === 1);
          video.onended = () => { if (!video.loop && !isFollower) nextItem(); };
          // Emit playback-state so the dashboard transport bar label (Play/Pause)
          // stays in sync with the physical wall's actual play/pause state.
          const emitPlaybackState = (paused) => {
            if (socket?.connected) {
              socket.emit('device:playback-state', {
                device_id: config.deviceId,
                paused,
                position_sec: video.currentTime || 0,
                content_id: item.content_id || null,
              });
            }
            publishPlayerState();
          };
          video.addEventListener('play',  () => emitPlaybackState(false));
          video.addEventListener('pause', () => emitPlaybackState(true));
          // Local-cache safety: swap to the server origin once if a local asset_url
          // fails, else (origin also failed / non-local) skip to the next item.
          attachOriginFallback(video, item, () => {
            console.error('Video error:', src);
            if (!isFollower) advanceTimer = setTimeout(nextItem, 3000);
          });
          video.onloadeddata = () => {
            if (currentCacheStatus === 'staging') {
              currentLocalAssetReady = true;
              currentCacheStatus = 'local';
            }
            console.log('[wall/audio] video loaded file=' + item.filename + ' role=' + (wallConfig ? (wallConfig.is_leader ? 'leader' : 'follower') : 'solo') + ' muted=' + video.muted + ' volume=' + video.volume);
            publishPlayerState();
          };
          // If anything (browser, scripts, the user) tries to unmute a
          // follower, snap it back. This is the safety net for the audio
          // bug — without it, a single stray unmute call causes echo.
          if (isFollower) {
            video.addEventListener('volumechange', () => {
              if (!video.muted) { video.muted = true; }
            });
          }
          mount.appendChild(video);
          currentVideoEl = video;
          // Try playing as we set muted above. If the browser blocks
          // unmuted autoplay (e.g. no user gesture yet), retry muted.
          const startVideo = () => video.play().then(() => {
            console.log('[wall/audio] play() ok muted=' + video.muted + ' volume=' + video.volume);
          }).catch((err) => {
            console.warn('[wall/audio] play() rejected, falling back to muted: ' + (err?.name || err?.message || err));
            video.muted = true;
            video.play()
              .then(() => console.log('[wall/audio] muted-fallback play() ok'))
              .catch((e2) => console.error('[wall/audio] muted-fallback play() also failed: ' + (e2?.name || e2?.message || e2)));
          });
          if (wallStartDelayMs > 0) setTimeout(startVideo, wallStartDelayMs);
          else startVideo();
          // Fallback: force play if not started after 2s
          setTimeout(() => { if (video.paused) { video.muted = true; video.play().catch(() => {}); } }, wallStartDelayMs + 2000);
        } else if (isImage) {
          const img = document.createElement('img');
          // Classroom displays normally read images from the P3 cache, which is
          // a different origin from the player. Anonymous CORS keeps the image
          // drawable to the preview canvas instead of tainting it and leaving
          // the dashboard stuck on the preceding media frame.
          img.crossOrigin = 'anonymous';
          img.style.cssText = `width:100%;height:100%;object-fit:${cssFit}`;
          img.addEventListener('load', () => {
            if (currentCacheStatus === 'staging') {
              currentLocalAssetReady = true;
              currentCacheStatus = 'local';
              publishPlayerState();
            }
            requestAnimationFrame(() => {
              if (img.isConnected && container.contains(img)) captureAndSend();
            });
          }, { once: true });
          attachOriginFallback(img, item, () => {
            console.error('Image error');
            if (!isFollower) advanceTimer = setTimeout(nextItem, 3000);
          });
          img.src = src;
          mount.appendChild(img);
          // Leader / single screen drives image advance; follower waits for sync
          if (!isFollower) advanceTimer = setTimeout(nextItem, (item.duration_sec || 10) * 1000);
        } else if (isPdf) {
          // Controllable PDF player: renders cached Poppler page images and
          // listens for Command Center transport messages. This avoids native
          // PDF-plugin quirks and lets prev/next move pages/slides reliably.
          const pdfFrame = document.createElement('iframe');
          pdfFrame.src = docPlayerSrc(item, cssFit) || (src + '#toolbar=0&navpanes=0&scrollbar=0&view=FitH');
          pdfFrame.style.cssText = `width:100%;height:100%;border:none;background:#fff;object-fit:${cssFit}`;
          pdfFrame.allow = 'autoplay; fullscreen';
          mount.appendChild(pdfFrame);
          if (!isFollower && playlist.length > 1) advanceTimer = setTimeout(nextItem, (item.duration_sec || 30) * 1000);
        } else if (isOffice) {
          // Office/ODF docs are converted to PDF server-side, then displayed by
          // the same controllable document player. For PowerPoint this means
          // each slide is one transport-controllable page image.
          const docFrame = document.createElement('iframe');
          const docSrc = docPlayerSrc(item, cssFit) || src;
          docFrame.src = docSrc;
          docFrame.style.cssText = `width:100%;height:100%;border:none;background:#fff;object-fit:${cssFit}`;
          docFrame.allow = 'autoplay; fullscreen';
          mount.appendChild(docFrame);
          if (!isFollower && playlist.length > 1) advanceTimer = setTimeout(nextItem, (item.duration_sec || 60) * 1000);
        } else if (item.widget_id) {
          const iframe = document.createElement('iframe');
          iframe.src = `${serverUrl}/api/widgets/${item.widget_id}/render`;
          iframe.style.cssText = 'width:100%;height:100%;border:none;background:#000';
          iframe.allow = 'autoplay; fullscreen';
          mount.appendChild(iframe);
          if (!isFollower) advanceTimer = setTimeout(nextItem, (item.duration_sec || 30) * 1000);
        }
      }
    }

    function renderZones(container, defaultItem) {
      // Multi-zone layout — zones are percentage-based (x_percent/width_percent…)
      // and rendered as CSS %, so a split-screen template auto-scales and snaps to
      // ANY target geometry (a 1080p TV or the ultra-wide wall) with no overrides.
      layout.zones.forEach(zone => {
        const div = document.createElement('div');
        div.className = 'zone';
        div.style.cssText = `left:${zone.x_percent}%;top:${zone.y_percent}%;width:${zone.width_percent}%;height:${zone.height_percent}%;z-index:${zone.z_index || 0}`;

        // Find assignment for this zone
        const assignment = playlist.find(a => a.zone_id === zone.id) || defaultItem;
        if (!assignment) return;

        const isVideo = assignment.mime_type?.startsWith('video/');
        const isImage = assignment.mime_type?.startsWith('image/');
        const isPdf = assignment.mime_type === 'application/pdf';
        const isOffice = isOfficeMime(assignment.mime_type);
        const src = contentSrcForItem(assignment);

        const isYoutubeZone = assignment.mime_type === 'video/youtube';

        if (zone.zone_type === 'widget' && assignment.widget_id) {
          const iframe = document.createElement('iframe');
          iframe.src = `${config.serverUrl}/api/widgets/${assignment.widget_id}/render`;
          div.appendChild(iframe);
        } else if (isYoutubeZone) {
          createYoutubeEmbed(src, assignment, div);
        } else if (isVideo) {
          const video = document.createElement('video');
          video.src = src;
          video.autoplay = true;
          video.muted = (zone.sort_order > 0); // Only first zone has audio
          video.loop = (playlist.length === 1);
          video.playsInline = true;
          video.style.cssText = `width:100%;height:100%;object-fit:${zone.fit_mode || 'cover'}`;
          attachOriginFallback(video, assignment);
          if (!video.loop) video.onended = () => nextItem();
          div.appendChild(video);
        } else if (isPdf || isOffice) {
          const iframe = document.createElement('iframe');
          iframe.src = docPlayerSrc(assignment, zone.fit_mode || 'contain') || src;
          iframe.style.cssText = 'width:100%;height:100%;border:none;background:#000';
          iframe.allow = 'autoplay; fullscreen';
          div.appendChild(iframe);
          if (playlist.length > 1) advanceTimer = setTimeout(nextItem, (assignment.duration_sec || 30) * 1000);
        } else if (isImage) {
          const img = document.createElement('img');
          img.src = src;
          img.style.cssText = `width:100%;height:100%;object-fit:${zone.fit_mode || 'cover'}`;
          attachOriginFallback(img, assignment);
          div.appendChild(img);
          if (playlist.length > 1) advanceTimer = setTimeout(nextItem, (assignment.duration_sec || 10) * 1000);
        } else {
          const iframe = document.createElement('iframe');
          iframe.src = src;
          iframe.style.cssText = 'width:100%;height:100%;border:none;background:#000';
          iframe.allow = 'autoplay; fullscreen';
          div.appendChild(iframe);
          if (playlist.length > 1) advanceTimer = setTimeout(nextItem, (assignment.duration_sec || 30) * 1000);
        }

        container.appendChild(div);
      });
    }

    // ==================== Screenshots ====================
    function requestIframeScreenshot() {
      const iframe = document.querySelector('#playerContainer iframe, .wall-stage iframe, .zone iframe');
      if (!iframe) return false;
      try {
        const childWindow = iframe.contentWindow;
        if (childWindow && typeof childWindow.publishScreenshot === 'function') {
          childWindow.publishScreenshot();
        } else if (childWindow) {
          childWindow.postMessage({ __mc_screenshot_request: true }, location.origin);
        }
      } catch (error) {
        console.warn('Child screenshot request failed:', error && error.message ? error.message : error);
      }
      // iframe pixels cannot be captured by the parent canvas. Never overwrite
      // the last real child frame with the generic Web Player fallback card.
      return true;
    }

    function captureAndSend() {
      if (!socket?.connected) return;
      if (requestIframeScreenshot()) return;
      const canvas = document.createElement('canvas');
      canvas.width = 960;
      canvas.height = 540;
      const ctx = canvas.getContext('2d');
      let captured = false;

      try {
        const container = document.getElementById('playerContainer');
        const video = container?.querySelector('video');
        const img = container?.querySelector('img');

        // Try video first
        if (video && video.readyState >= 2 && video.videoWidth > 0) {
          try {
            ctx.drawImage(video, 0, 0, 960, 540);
            captured = true;
          } catch (e) {
            console.warn('Video capture failed (CORS?):', e.message);
          }
        }

        // Try image
        if (!captured && img && img.complete && img.naturalWidth > 0) {
          try {
            ctx.drawImage(img, 0, 0, 960, 540);
            captured = true;
          } catch (e) {
            console.warn('Image capture failed:', e.message);
          }
        }

        // Fallback: draw status info
        if (!captured) {
          ctx.fillStyle = '#111827';
          ctx.fillRect(0, 0, 960, 540);
          ctx.fillStyle = '#3b82f6';
          ctx.font = 'bold 28px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('Media Control Web Player', 480, 230);
          ctx.fillStyle = '#94a3b8';
          ctx.font = '16px sans-serif';
          const item = playlist[currentIndex];
          ctx.fillText(item ? `Playing: ${item.filename}` : 'No content', 480, 270);
          ctx.fillText(`${config.deviceName || 'Web Player'} | ${new Date().toLocaleTimeString()}`, 480, 310);
        }
      } catch (e) {
        // Even on error, draw something
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 960, 540);
        ctx.fillStyle = '#ef4444';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Screenshot error: ' + e.message, 480, 270);
      }

      try {
        const dataUrl = canvas.toDataURL('image/jpeg', 0.4);
        const base64 = dataUrl.split(',')[1];
        if (base64 && base64.length > 100) {
          lastScreenshotSentAt = Date.now();
          socket.emit('device:screenshot', { device_id: config.deviceId, image_b64: base64 });
          console.log('Screenshot sent:', base64.length, 'chars', captured ? '(content)' : '(fallback)');
        }
      } catch (e) {
        console.error('Screenshot encode/send failed:', e);
      }
    }

    function startStreaming() {
      stopStreaming();
      streamTimer = setInterval(captureAndSend, 1000);
    }

    function stopStreaming() {
      if (streamTimer) { clearInterval(streamTimer); streamTimer = null; }
    }

    // ==================== UI Helpers ====================
    function showStatus(msg) {
      document.getElementById('statusOverlay').style.display = 'flex';
      document.getElementById('statusText').textContent = msg;
    }

    function hideStatus() {
      document.getElementById('statusOverlay').style.display = 'none';
    }

    function toggleScreenOff() {
      let overlay = document.getElementById('screenOffOverlay');
      if (overlay) { overlay.remove(); return; }
      overlay = document.createElement('div');
      overlay.id = 'screenOffOverlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9999;cursor:pointer';
      overlay.onclick = () => overlay.remove();
      document.body.appendChild(overlay);
    }

    // Create info overlay (toggled by Back button)
    const infoDiv = document.createElement('div');
    infoDiv.id = 'infoOverlay';
    infoDiv.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:800;display:none;flex-direction:column;align-items:center;justify-content:center;color:#f1f5f9;font-family:-apple-system,sans-serif';
    infoDiv.innerHTML = `
      <h2 style="color:#3b82f6;margin-bottom:16px">${_t('info_title')}</h2>
      <div style="font-size:14px;line-height:2;text-align:center;color:#94a3b8" id="infoContent"></div>
      <p style="margin-top:24px;font-size:12px;color:#64748b">${_t('info_close_hint')}</p>
    `;
    infoDiv.onclick = () => { infoDiv.style.display = 'none'; };
    document.body.appendChild(infoDiv);

    // Escape user-controllable values before injecting into innerHTML — filenames,
    // device names, and server URLs are stored on the server and could contain HTML.
    const escHtml = (s) => s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    // Update info overlay content periodically
    setInterval(() => {
      const el = document.getElementById('infoContent');
      if (!el) return;
      const item = playlist[currentIndex];
      el.innerHTML = `
        ${_t('info_device_id')}: ${escHtml(config.deviceId?.slice(0, 8) || _t('info_na'))}...<br>
        ${_t('info_device_name')}: ${escHtml(config.deviceName || _t('info_na'))}<br>
        ${_t('info_server')}: ${escHtml(config.serverUrl || _t('info_na'))}<br>
        ${_t('info_status')}: ${socket?.connected ? `<span style="color:#22c55e">${_t('info_connected')}</span>` : `<span style="color:#ef4444">${_t('info_disconnected')}</span>`}<br>
        ${_t('info_now_playing')}: ${escHtml(item?.filename || _t('info_nothing'))} (${currentIndex + 1}/${playlist.length})<br>
        ${_t('info_resolution')}: ${screen.width}x${screen.height}<br>
        ${_t('info_uptime')}: ${Math.floor(performance.now() / 60000)}m<br>
        ${_t('info_platform')}: ${escHtml(navigator.platform)}<br>
        ${_t('info_cache')}: ${_t('info_sw')} ${navigator.serviceWorker?.controller ? `<span style="color:#22c55e">${_t('info_active')}</span>` : _t('info_inactive')}
      `;
    }, 2000);

    // ==================== Fullscreen ====================
    // Only attempt fullscreen on genuine user clicks. Synthetic clicks dispatched
    // by the remote-control feature (touch forwarding from the dashboard) are not
    // trusted by the browser and requestFullscreen() rejects with a "Permissions
    // check failed" / "API can only be initiated by a user gesture" error every
    // time, spamming the console.
    document.addEventListener('click', (e) => {
      if (!e.isTrusted) return;
      if (!document.fullscreenElement && config.paired) {
        document.documentElement.requestFullscreen?.() ||
        document.documentElement.webkitRequestFullscreen?.();
      }
    });

    // Prevent sleep/screen saver
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => { setTimeout(requestWakeLock, 1000); });
        }
      } catch {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });

    // Register service worker for offline content caching
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/player/sw.js').then(reg => {
        console.log('Service Worker registered');
        // When a new SW activates, reload so the fresh code takes effect immediately
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                console.log('New Service Worker activated — reloading for fresh code');
                location.reload();
              }
            });
          }
        });
      }, (err) => console.warn('SW registration failed:', err));
    }

    // ==================== Keyboard shortcuts ====================
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        // Reset config and go back to setup
        if (confirm('Reset player and return to setup?')) {
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(PLAYLIST_CACHE_KEY);
          location.reload();
        }
      }
      if (e.key === 'f' || e.key === 'F11') {
        e.preventDefault();
        if (document.fullscreenElement) document.exitFullscreen();
        else document.documentElement.requestFullscreen();
      }
    });
  </script>
  <script src="/player/screen-share-receiver.js" defer></script>
</body>
</html>
