<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Document Player</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
    #page { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
    body[data-fit="cover"] #page { object-fit: cover; }
    body[data-fit="fill"] #page { object-fit: fill; }
    #status {
      position: fixed; left: 50%; bottom: max(18px, env(safe-area-inset-bottom)); transform: translateX(-50%);
      z-index: 3; max-width: min(92vw, 820px); padding: 8px 13px; border-radius: 999px;
      color: #fff; background: rgba(0,0,0,.62); box-shadow: 0 10px 32px rgba(0,0,0,.35);
      font-size: clamp(12px, 1.35vw, 18px); font-weight: 700; letter-spacing: .01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0; transition: opacity .18s ease;
      pointer-events: none;
    }
    body[data-show-status="1"] #status { opacity: 1; }
    #error {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 40px;
      color: #fecaca; background: #0f172a; font: 700 clamp(18px, 2vw, 30px)/1.35 system-ui, sans-serif; text-align: center;
    }
    body[data-error="1"] #error { display: flex; }
    body[data-error="1"] #stage, body[data-error="1"] #status { display: none; }
  </style>
</head>
<body>
  <div id="stage"><img id="page" alt="Document page"></div>
  <div id="status" aria-live="polite"></div>
  <div id="error">Document failed to load.</div>
  <script src="/player/device-contract.js"></script>
  <script>
    (function () {
      'use strict';
      var parts = location.pathname.split('/').filter(Boolean);
      var id = parts[parts.length - 1] || '';
      var params = new URLSearchParams(location.search || '');
      var fit = params.get('fit') === 'cover' ? 'cover' : params.get('fit') === 'fill' ? 'fill' : 'contain';
      document.body.dataset.fit = fit;

      var img = document.getElementById('page');
      var statusEl = document.getElementById('status');
      var page = Math.max(1, parseInt(params.get('page') || '1', 10) || 1);
      var pages = 1;
      var filename = 'Document';
      var version = '';
      var statusTimer = null;
      var playTimer = null;

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function showStatus(ms) {
        statusEl.innerHTML = esc(filename) + ' · ' + page + ' / ' + pages;
        document.body.dataset.showStatus = '1';
        clearTimeout(statusTimer);
        statusTimer = setTimeout(function () { document.body.dataset.showStatus = '0'; }, ms || 1400);
      }
      function pageUrl(n) {
        var q = version ? ('?v=' + encodeURIComponent(version)) : '';
        return '/player/doc-page/' + encodeURIComponent(id) + '/' + n + '.png' + q;
      }
      function prefetch(n) {
        if (n < 1 || n > pages) return;
        var im = new Image();
        im.src = pageUrl(n);
      }
      function currentState() {
        var paused = !playTimer;
        var error = document.body.dataset.error === '1';
        return {
          content_id: id,
          content_type: 'document',
          kind: 'document',
          title: filename,
          media_title: filename,
          media_type: 'document',
          fit: fit,
          version: version,
          page: page,
          slide_index: page,
          slide_total: pages,
          total_pages: pages,
          current_time: page,
          duration: pages,
          paused: paused,
          render_state: error ? 'error' : (paused ? 'paused' : 'playing'),
          status: error ? 'error' : (paused ? 'paused' : 'playing'),
          error_state: error ? 'Document failed to load.' : null,
        };
      }
      function publishState(ack) {
        var state = currentState();
        window.__mcTransportState = state;
        if (window.parent && window.parent !== window) {
          var msg = { __mc_transport_state: state };
          if (ack) msg.__mc_transport_ack = ack;
          try { window.parent.postMessage(msg, location.origin); } catch (e) {}
        }
        return state;
      }
      function publishScreenshot() {
        if (!img.complete || !img.naturalWidth || !img.naturalHeight) return false;
        try {
          var canvas = document.createElement('canvas');
          canvas.width = 960;
          canvas.height = 540;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          var scaleX = canvas.width / img.naturalWidth;
          var scaleY = canvas.height / img.naturalHeight;
          var scale = fit === 'fill' ? null : (fit === 'cover' ? Math.max(scaleX, scaleY) : Math.min(scaleX, scaleY));
          var width = scale == null ? canvas.width : img.naturalWidth * scale;
          var height = scale == null ? canvas.height : img.naturalHeight * scale;
          ctx.drawImage(img, (canvas.width - width) / 2, (canvas.height - height) / 2, width, height);
          var base64 = canvas.toDataURL('image/jpeg', 0.58).split(',')[1];
          if (base64 && window.parent && window.parent !== window) {
            window.parent.postMessage({ __mc_screenshot: base64, captured_at: Date.now() }, location.origin);
            return true;
          }
        } catch (e) {
          console.warn('[doc-player] screenshot failed:', e && e.message ? e.message : e);
        }
        return false;
      }
      function render(n, announce) {
        page = Math.max(1, Math.min(pages, parseInt(n, 10) || 1));
        img.src = pageUrl(page);
        img.onload = function () {
          prefetch(page + 1);
          prefetch(page - 1);
          publishScreenshot();
        };
        if (announce !== false) showStatus();
        publishState();
      }
      function stopAuto() {
        if (playTimer) clearInterval(playTimer);
        playTimer = null;
        publishState();
      }
      function toggleAuto() {
      if (playTimer) { stopAuto(); showStatus(); return; }
      playTimer = setInterval(function () {
        render(page >= pages ? 1 : page + 1, true);
      }, Math.max(2500, parseInt(params.get('interval') || '8000', 10) || 8000));
      showStatus();
      publishState();
    }
      function unwrapTransportPayload(payload) {
        var current = payload;
        for (var i = 0; i < 4; i++) {
          if (!current || typeof current !== 'object' || Array.isArray(current)) break;
          var nested = current.payload;
          var wrapped = current.action || current.command || current.type;
          if (!wrapped || !nested || typeof nested !== 'object' || Array.isArray(nested)) break;
          current = nested;
        }
        return current && typeof current === 'object' && !Array.isArray(current) ? current : {};
      }
      function normalizeAction(input) {
        if (window.MbfdDeviceContract && typeof window.MbfdDeviceContract.normalizeCommand === 'function') {
          var normalized = window.MbfdDeviceContract.normalizeCommand(input, {
            device_id: 'document-child',
            target_scope: 'display',
          });
          if (normalized.ok) {
            return {
              action: normalized.value.payload.action,
              payload: normalized.value.payload,
              command_id: normalized.value.command_id,
            };
          }
        }
        var action = '';
        var payload = {};
        var commandId = null;
        if (typeof input === 'string') {
          action = input;
        } else if (input && typeof input === 'object') {
          var rawPayload = input.payload && typeof input.payload === 'object' && !Array.isArray(input.payload) ? input.payload : null;
          action = (rawPayload && (rawPayload.action || rawPayload.command || rawPayload.type)) || input.action || input.command || input.type || '';
          payload = rawPayload && (rawPayload.action || rawPayload.command || rawPayload.type)
            ? unwrapTransportPayload(rawPayload)
            : (rawPayload || input);
          commandId = input.command_id || input.commandId || input.id || null;
        }
        return { action: String(action || '').trim(), payload: payload || {}, command_id: commandId };
      }
      function goToPage(value) {
        var parsed = parseInt(value, 10);
        if (!Number.isFinite(parsed)) throw new Error('Missing page number');
        render(parsed, true);
      }
      function handleAction(input) {
        var cmd = normalizeAction(input);
        var action = cmd.action;
        var ack = { command_id: cmd.command_id || null, action: action || null, ok: true, status: 'acked', type: 'transport' };
        try {
          if (action === 'next' || action === 'next_slide') render(page + 1, true);
          else if (action === 'prev' || action === 'previous' || action === 'previous_slide') render(page - 1, true);
          else if (action === 'restart' || action === 'restart_deck' || action === 'reset') { stopAuto(); render(1, true); }
          else if (action === 'play_pause' || action === 'toggle_play_pause') toggleAuto();
          else if (action === 'pause' || action === 'pause_deck') stopAuto();
          else if (action === 'play' || action === 'resume' || action === 'resume_deck') { if (!playTimer) toggleAuto(); }
          else if (action === 'go_to_slide' || action === 'slide' || action === 'goto') {
            goToPage(cmd.payload.page || cmd.payload.slide || cmd.payload.index || cmd.payload.page_number);
          } else {
            throw new Error('Unsupported action: ' + action);
          }
        } catch (err) {
          ack.ok = false;
          ack.status = 'failed';
          ack.error = err && err.message ? err.message : String(err || 'Action failed');
        }
        ack.state = publishState(ack);
        return ack;
      }
      // Expose handleAction on window so the parent player page can call it
      // directly (same-origin) as the primary path when it is available.
      window.handleAction = handleAction;
      window.publishScreenshot = publishScreenshot;

      window.addEventListener('message', function (event) {
        if (!event || event.origin !== location.origin || event.source !== window.parent) return;
        var data = event && event.data;
        if (!data) return;
        if (data.__mc_screenshot_request === true) {
          publishScreenshot();
          return;
        }
        if (data.__mc_transport == null) return;
        handleAction(data.__mc_transport);
      });
      window.addEventListener('keydown', function (event) {
        if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') { event.preventDefault(); handleAction('next'); }
        else if (event.key === 'ArrowLeft' || event.key === 'PageUp') { event.preventDefault(); handleAction('prev'); }
        else if (event.key === 'Home') { event.preventDefault(); handleAction('restart'); }
      });
      document.addEventListener('click', function () { handleAction('next'); });

      fetch('/player/doc-meta/' + encodeURIComponent(id), { cache: 'no-store' })
        .then(function (r) { if (!r.ok) throw new Error('metadata ' + r.status); return r.json(); })
        .then(function (meta) {
          pages = Math.max(1, parseInt(meta.pages, 10) || 1);
          filename = meta.filename || filename;
          version = meta.version || '';
          render(page, true);
          publishState({ action: 'ready', ok: true, status: 'ready' });
        })
        .catch(function (e) {
          console.error('[doc-player] failed:', e);
          document.body.dataset.error = '1';
          publishState({ action: 'load', ok: false, status: 'failed', error: e && e.message ? e.message : String(e || 'load failed') });
        });

      publishState();
    })();
  </script>
</body>
</html>
