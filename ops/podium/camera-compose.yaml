services:
  camera-2:
    image: mbfd/camera-ffmpeg:local
    container_name: mbfd-kamrui-camera-2
    restart: unless-stopped
    labels:
      mbfd.role: camera-publisher
    network_mode: host
    devices:
      - "${CAMERA_VIDEO_DEVICE:-/dev/video2}:/dev/video2"
      - "/dev/snd:/dev/snd"
    healthcheck:
      test: ["CMD-SHELL", "ss -tn state established dst 100.81.154.123:1935 | grep -q ESTAB"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Override the image entrypoint so we can wrap ffmpeg in a reconnect loop.
    # The while-true/sleep-3 prevents rapid Docker restart cycles that cause
    # "Device or resource busy" on the v4l2 exclusive lock.
    entrypoint: ["/bin/sh", "-c"]
    command: |
      while true; do
        ffmpeg -hide_banner -loglevel warning \
          -thread_queue_size 2048 \
          -f v4l2 -input_format yuyv422 -framerate 10 -video_size 1280x720 \
          -i /dev/video2 \
          -thread_queue_size 2048 \
          -f alsa -ar 48000 -ac 1 \
          -i hw:C920,0 \
          -vf format=yuv420p \
          -c:v libx264 -preset ultrafast -tune zerolatency \
          -b:v 2000k -maxrate 2000k -bufsize 4000k -g 20 \
          -c:a aac -b:a 128k -ar 48000 -ac 1 \
          -f flv rtmp://100.81.154.123:1935/kamrui-camera-2 || true
        echo "[cam2] ffmpeg exited, reconnecting in 3s..."
        sleep 3
      done
